<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Porta-Link: Screen Caster v4.0</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: 'Segoe UI', Roboto, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* Background Preview */
        video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; opacity: 0.2; }
        
        .ui-card { position: relative; z-index: 10; background: rgba(20, 20, 20, 0.85); padding: 40px; border-radius: 16px; border: 1px solid rgba(0, 210, 255, 0.3); text-align: center; backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.8); width: 300px; }
        h1 { color: #00d2ff; letter-spacing: 4px; margin-top: 0; font-weight: 300; }
        p { color: #888; font-size: 0.9rem; margin-bottom: 20px; }
        
        input[type="text"] { font-size: 28px; text-align: center; padding: 15px; width: 60%; background: rgba(0,0,0,0.5); color: #00ff00; border: 1px solid #333; border-radius: 8px; letter-spacing: 8px; font-weight: bold; margin-bottom: 20px; outline: none; }
        
        button { background: linear-gradient(135deg, #00d2ff 0%, #0078ff 100%); color: white; border: none; padding: 15px; font-size: 15px; font-weight: bold; border-radius: 30px; cursor: pointer; text-transform: uppercase; width: 100%; letter-spacing: 1px; transition: transform 0.2s; margin-bottom: 15px;}
        .btn-alt { background: transparent; border: 1px solid #ff9d00; color: #ff9d00; }
        
        #status { margin-top: 10px; color: #ff9d00; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; font-weight: bold; }
    </style>
</head>
<body>
    
    <video id="screen-preview" autoplay playsinline muted></video>

    <div class="ui-card" id="ui">
        <h1>PORTA-LINK</h1>
        <p>Live Screen Casting v4.0</p>
        
        <button id="btn-share" class="btn-alt">1. CAPTURE PHONE SCREEN</button>
        
        <input type="text" id="pin" placeholder="----" maxlength="4" autocomplete="off">
        <button id="btn-connect">2. BEAM TO HEADSET</button>
        <div id="status">Awaiting Screen Auth...</div>
    </div>

    <script>
        const dom = {
            pin: document.getElementById('pin'), btnShare: document.getElementById('btn-share'),
            btnConnect: document.getElementById('btn-connect'), status: document.getElementById('status'),
            video: document.getElementById('screen-preview'), ui: document.getElementById('ui')
        };

        const peer = new Peer(null, { debug: 2 });
        let localStream = null;

        // 1. Ask the mobile OS for permission to record the screen
        dom.btnShare.addEventListener('click', async () => {
            try {
                dom.status.innerText = "REQUESTING OS PERMISSION...";
                localStream = await navigator.mediaDevices.getDisplayMedia({ 
                    video: { frameRate: { ideal: 30, max: 60 } }, 
                    audio: true 
                });
                
                dom.video.srcObject = localStream;
                dom.btnShare.innerText = "SCREEN CAPTURED";
                dom.btnShare.style.borderColor = "#00ff00";
                dom.btnShare.style.color = "#00ff00";
                dom.status.innerText = "READY FOR UPLINK.";
                
                // If user stops sharing via the native OS button
                localStream.getVideoTracks()[0].onended = () => {
                    dom.btnShare.innerText = "1. CAPTURE PHONE SCREEN";
                    dom.btnShare.style.borderColor = "#ff9d00";
                    dom.btnShare.style.color = "#ff9d00";
                    dom.status.innerText = "CAPTURE ENDED.";
                };
            } catch (err) {
                console.error(err);
                dom.status.innerText = "OS DENIED SCREEN CAPTURE.";
                dom.status.style.color = "#ff4444";
            }
        });

        // 2. Beam the captured screen to the VR Hub
        dom.btnConnect.addEventListener('click', () => {
            if (!localStream) {
                dom.status.innerText = "CAPTURE SCREEN FIRST.";
                return;
            }

            const pin = dom.pin.value.trim();
            if(pin.length !== 4) return;
            const hubId = 'juncos-hub-' + pin;

            dom.status.innerText = "PUNCHING THROUGH...";

            // Send the screen feed!
            const call = peer.call(hubId, localStream, { metadata: { device: 'pc' } }); // Spoofing as PC to use the main big screen
            const dataConn = peer.connect(hubId);

            dataConn.on('open', () => {
                dom.ui.style.opacity = '0'; 
                setTimeout(() => dom.ui.style.display = 'none', 500);
                dom.video.style.opacity = '1'; 
            });

            call.on('close', () => {
                dom.ui.style.display = 'block'; 
                setTimeout(() => dom.ui.style.opacity = '1', 50);
                dom.video.style.opacity = '0.2';
                dom.status.innerText = "UPLINK SEVERED.";
            });
        });
    </script>
</body>
</html>
