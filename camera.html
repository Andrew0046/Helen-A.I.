<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drone Cam & Portable Server v2.1</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: 'Segoe UI', Roboto, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; opacity: 0.3; transition: opacity 0.5s; }
        .ui-card { position: relative; z-index: 10; background: rgba(20, 20, 20, 0.85); padding: 40px; border-radius: 16px; border: 1px solid rgba(0, 210, 255, 0.3); text-align: center; backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.8); width: 300px; }
        h1 { color: #00d2ff; letter-spacing: 4px; margin-top: 0; font-weight: 300; }
        p { color: #888; font-size: 0.9rem; margin-bottom: 20px; }
        input[type="text"] { font-size: 28px; text-align: center; padding: 15px; width: 60%; background: rgba(0,0,0,0.5); color: #00ff00; border: 1px solid #333; border-radius: 8px; letter-spacing: 8px; font-weight: bold; margin-bottom: 20px; outline: none; }
        input[type="text"]:focus { border-color: #00d2ff; }
        button { background: linear-gradient(135deg, #00d2ff 0%, #0078ff 100%); color: white; border: none; padding: 15px 30px; font-size: 16px; font-weight: bold; border-radius: 30px; cursor: pointer; text-transform: uppercase; width: 100%; letter-spacing: 1px; transition: transform 0.2s; }
        button:hover { transform: translateY(-2px); }
        .btn-alt { background: transparent; border: 1px solid #00d2ff; color: #00d2ff; margin-bottom: 20px; }
        #status { margin-top: 20px; color: #ff9d00; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; font-weight: bold; }
        #telemetry-hud { position: absolute; bottom: 30px; left: 30px; z-index: 10; font-family: monospace; font-size: 18px; color: #00ff00; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 8px; border-left: 3px solid #00ff00; display: none; text-shadow: 0 0 5px #00ff00; pointer-events: none; }
    </style>
</head>
<body>
    <video id="cam-preview" autoplay playsinline muted></video>
    <div id="telemetry-hud">SYS.TELEMETRY<br>PITCH: <span id="val-p">0.00</span>&deg;<br>YAW&nbsp;&nbsp;: <span id="val-y">0.00</span>&deg;</div>
    <div class="ui-card" id="ui">
        <h1>PORTA-LINK</h1>
        <p>Stream Camera or Local File</p>
        <input type="file" id="file-input" accept="video/*" style="display:none">
        <button id="btn-file" class="btn-alt">STREAM LOCAL VIDEO</button>
        <input type="text" id="pin" placeholder="----" maxlength="4" autocomplete="off">
        <button id="btn-connect">ENGAGE UPLINK</button>
        <div id="status">Warming up optics...</div>
    </div>

    <script>
        const dom = {
            pin: document.getElementById('pin'), btnConnect: document.getElementById('btn-connect'),
            status: document.getElementById('status'), video: document.getElementById('cam-preview'),
            ui: document.getElementById('ui'), telemetry: document.getElementById('telemetry-hud'),
            valP: document.getElementById('val-p'), valY: document.getElementById('val-y'),
            fileInput: document.getElementById('file-input'), btnFile: document.getElementById('btn-file')
        };

        const peer = new Peer(null, { debug: 2 });
        let localStream;
        let isUsingCamera = true;

        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }, audio: true })
            .then(stream => {
                localStream = stream;
                dom.video.srcObject = stream;
                dom.status.innerText = "OPTICS ONLINE. STANDBY.";
            })
            .catch(err => {
                dom.status.innerText = "CAMERA ACCESS DENIED.";
                dom.status.style.color = "#ff4444";
            });

        dom.btnFile.addEventListener('click', () => { dom.fileInput.click(); });
        
        dom.fileInput.addEventListener('change', (e) => {
            if(e.target.files.length > 0) {
                const file = e.target.files[0];
                const url = URL.createObjectURL(file);
                
                if (isUsingCamera && localStream) {
                    localStream.getTracks().forEach(track => track.stop());
                }
                isUsingCamera = false;

                dom.video.srcObject = null;
                dom.video.src = url;
                dom.video.loop = true;
                
                // THE FIX: UNMUTE THE SENDER SO AUDIO CAN ENTER THE PIPE
                dom.video.muted = false; 
                
                dom.video.play().then(() => {
                    localStream = dom.video.captureStream ? dom.video.captureStream() : dom.video.mozCaptureStream();
                    dom.btnFile.innerText = "MEDIA LOADED";
                    dom.btnFile.style.borderColor = "#00ff00";
                    dom.btnFile.style.color = "#00ff00";
                    dom.status.innerText = "FILE READY FOR UPLINK.";
                });
            }
        });

        dom.btnConnect.addEventListener('click', () => {
            const pin = dom.pin.value.trim();
            if(pin.length !== 4) { dom.status.innerText = "INVALID PIN"; return; }
            const hubId = 'juncos-hub-' + pin;
            dom.status.innerText = "PUNCHING THROUGH...";

            const call = peer.call(hubId, localStream, { metadata: { device: 'drone' } });
            const dataConn = peer.connect(hubId);

            dataConn.on('open', () => {
                dom.ui.style.opacity = '0';
                setTimeout(() => dom.ui.style.display = 'none', 500);
                dom.video.style.opacity = '1'; 
                dom.telemetry.style.display = 'block';
            });

            dataConn.on('data', (data) => {
                if(data && typeof data.p === 'number' && typeof data.y === 'number') {
                    const pitchDeg = (data.p * 180 / Math.PI).toFixed(1);
                    const yawDeg = (data.y * 180 / Math.PI).toFixed(1);
                    dom.valP.innerText = pitchDeg > 0 ? "+" + pitchDeg : pitchDeg;
                    dom.valY.innerText = yawDeg > 0 ? "+" + yawDeg : yawDeg;
                }
            });

            call.on('close', () => {
                dom.ui.style.display = 'block';
                setTimeout(() => dom.ui.style.opacity = '1', 50);
                dom.video.style.opacity = '0.3';
                dom.telemetry.style.display = 'none';
                dom.status.innerText = "UPLINK SEVERED.";
            });
        });
    </script>
</body>
</html>
