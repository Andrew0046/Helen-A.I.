<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni-Vault: Modern Auto-Fetch + Local</title>
    <style>
        /* MODERN THEME: Sleek, Minimalist, Glassmorphism */
        body { margin: 0; background: #000; color: #f5f5f7; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        #setup-ui { text-align: left; z-index: 10; background: rgba(20, 20, 22, 0.75); padding: 35px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 24px 48px rgba(0, 0, 0, 0.6); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); width: 90vw; max-width: 1400px; height: 85vh; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        #layout-wrapper { display: flex; flex: 1; width: 100%; height: 100%; transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1); }
        #left-zone { flex: 1; display: flex; flex-direction: column; transition: width 0.4s cubic-bezier(0.25, 1, 0.5, 1); width: 100%; height: 100%; padding-right: 15px; }
        
        h2 { font-weight: 600; letter-spacing: 1px; color: #fff; margin-top: 0; font-size: 28px; margin-bottom: 25px; }
        
        /* COMMAND DECK */
        .controls-row { display: flex; gap: 12px; margin-bottom: 25px; flex-shrink: 0; align-items: stretch; }
        input[type="text"] { flex: 2; padding: 16px 20px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 14px; font-size: 15px; outline: none; transition: all 0.2s; }
        input[type="text"]:focus { border-color: #0A84FF; background: rgba(255,255,255,0.08); }
        input[type="text"]::placeholder { color: #86868b; }
        
        button { background: #f5f5f7; border: none; color: #1d1d1f; cursor: pointer; border-radius: 14px; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
        button:hover { transform: scale(1.02); background: #ffffff; box-shadow: 0 4px 12px rgba(255, 255, 255, 0.1); }

        .btn-add { padding: 0 30px; }
        .btn-secondary { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.15); color: #f5f5f7; padding: 0 20px; flex: 1; }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.1); border-color: rgba(255, 255, 255, 0.3); color: #fff; }
        
        .btn-local { border-color: #0A84FF; color: #0A84FF; }
        .btn-local:hover { background: rgba(10, 132, 255, 0.1); border-color: #0A84FF; color: #fff; }

        .btn-scroll { padding: 0 20px; font-size: 16px; color: #86868b; flex: none; }
        .btn-scroll:hover { color: #fff; }

        #grid-container { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; padding: 5px; overflow-y: auto; scroll-behavior: smooth; scrollbar-width: none; -ms-overflow-style: none; }
        #grid-container::-webkit-scrollbar { display: none; }
        
        /* DYNAMIC AUTO-FETCH STREAM CARDS */
        .video-card { background-color: rgba(255, 255, 255, 0.05); background-size: cover; background-position: center; border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 18px; height: 320px; display: flex; flex-direction: column; justify-content: flex-end; cursor: pointer; position: relative; overflow: hidden; transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1); box-sizing: border-box; }
        .video-card:hover { border-color: rgba(255, 255, 255, 0.3); transform: translateY(-6px) scale(1.03); box-shadow: 0 15px 30px rgba(0, 0, 0, 0.6); }
        .card-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.4) 40%, rgba(0,0,0,0) 100%); z-index: 1; pointer-events: none; }
        .card-content { position: relative; z-index: 2; padding: 20px; pointer-events: none; }
        .card-title { color: #fff; font-size: 16px; font-weight: 600; line-height: 1.3; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        .card-meta { color: #a1a1a6; font-size: 12px; margin-top: 8px; font-weight: 600; text-transform: uppercase; }
        
        .btn-del-card { position: absolute; top: 12px; right: 12px; background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; z-index: 5; transition: all 0.2s; display: flex; align-items: center; justify-content: center; font-family: sans-serif; font-size: 12px; backdrop-filter: blur(10px); }
        .btn-del-card:hover { background: #ff3b30; border-color: #ff3b30; transform: scale(1.1); }

        /* DETAILS PANEL */
        #codex-panel { width: 0; opacity: 0; overflow: hidden; display: flex; flex-direction: column; background: rgba(0, 0, 0, 0.4); border-left: 1px solid transparent; padding: 0; transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1); flex-shrink: 0; border-radius: 0 24px 24px 0; }
        #codex-panel.active { width: 420px; opacity: 1; border-left: 1px solid rgba(255, 255, 255, 0.08); padding: 0 0 0 35px; margin-left: 35px; }
        .codex-header { color: #86868b; font-size: 12px; letter-spacing: 1px; margin-bottom: 25px; border-bottom: 1px solid rgba(255, 255, 255, 0.08); padding-bottom: 15px; display: flex; justify-content: space-between; align-items: center; font-weight: 600; text-transform: uppercase; }
        .btn-close-codex { background: rgba(255, 255, 255, 0.08); border: none; color: #fff; padding: 6px 14px; border-radius: 10px; font-size: 11px; }
        .btn-close-codex:hover { background: rgba(255, 255, 255, 0.15); }
        #codex-art { width: 100%; height: 200px; background-color: rgba(255,255,255,0.05); background-size: cover; background-position: center; border-radius: 16px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); display: none; }
        #codex-title { font-size: 26px; font-weight: 600; line-height: 1.2; margin-bottom: 25px; color: #fff; }
        .codex-data { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.04); padding: 25px; border-radius: 16px; font-size: 14px; color: #a1a1a6; margin-bottom: auto; line-height: 1.7; font-weight: 400; }
        .data-highlight { color: #fff; font-weight: 500; }
        #btn-launch-uplink { background: #0A84FF; border: none; color: #fff; font-size: 15px; padding: 20px; width: 100%; border-radius: 16px; margin-top: 25px; transition: all 0.2s; text-transform: none; letter-spacing: 0; }
        #btn-launch-uplink:hover { background: #007aff; transform: scale(1.02); box-shadow: 0 8px 20px rgba(10, 132, 255, 0.3); }

        /* THE FULLSCREEN PLAYER */
        video { display: none; width: 100vw; height: 100vh; object-fit: contain; position: absolute; top: 0; left: 0; z-index: 1; outline: none; background: black; }
        #exit-hint { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 5; background: rgba(28, 28, 30, 0.8); color: #fff; padding: 12px 24px; border-radius: 30px; font-size: 13px; font-weight: 500; opacity: 0; transition: opacity 0.5s; pointer-events: none; backdrop-filter: blur(10px); }
    </style>
</head>
<body>

    <div id="setup-ui">
        <div id="layout-wrapper">
            
            <div id="left-zone">
                <h2>Stream Hub</h2>
                
                <div class="controls-row">
                    <input type="text" id="stream-url" placeholder="Paste web media link here..." autocomplete="off">
                    <button id="btn-add" class="btn-add hitbox">Save Web Link</button>
                    
                    <input type="file" id="local-upload" accept="video/*, audio/*" multiple style="display: none;">
                    <button class="btn-secondary btn-local hitbox" id="btn-local-trigger">📱 Add Local Files</button>
                    
                    <input type="file" id="txt-upload" accept=".txt" style="display: none;">
                    <button class="btn-secondary btn-import hitbox" id="btn-import-trigger">📁 Import Playlist</button>
                    
                    <button class="btn-secondary btn-scroll hitbox" id="btn-up">▲</button>
                    <button class="btn-secondary btn-scroll hitbox" id="btn-down">▼</button>
                </div>

                <div id="grid-container"></div>
            </div>

            <div id="codex-panel">
                <div class="codex-header">
                    <span>Details</span>
                    <button class="btn-close-codex hitbox" id="btn-close-codex">Close</button>
                </div>
                
                <div id="codex-art"></div>
                <div id="codex-title">Select a stream to begin.</div>
                
                <div class="codex-data">
                    STATUS: <span class="data-highlight" style="color:#32d74b;">Ready</span><br><br>
                    SOURCE: <span class="data-highlight" id="codex-source">---</span><br>
                    FORMAT: <span class="data-highlight">Spatial Video Stream</span><br>
                    LATENCY: <span class="data-highlight">Optimized</span><br><br>
                    Bridge established. Awaiting command to push feed to VR display.
                </div>

                <button class="hitbox" id="btn-launch-uplink">Play Stream</button>
            </div>

        </div>
    </div>

    <video id="theater-screen" autoplay></video>
    <div id="exit-hint">Double-click to exit theater</div>

    <script>
        const ui = document.getElementById('setup-ui');
        const video = document.getElementById('theater-screen');
        const input = document.getElementById('stream-url');
        const btnAdd = document.getElementById('btn-add');
        const gridDiv = document.getElementById('grid-container');
        const exitHint = document.getElementById('exit-hint');
        
        const txtInput = document.getElementById('txt-upload');
        const btnImportTrigger = document.getElementById('btn-import-trigger');
        
        const localInput = document.getElementById('local-upload');
        const btnLocalTrigger = document.getElementById('btn-local-trigger');

        const btnUp = document.getElementById('btn-up');
        const btnDown = document.getElementById('btn-down');
        
        const codexPanel = document.getElementById('codex-panel');
        const codexTitle = document.getElementById('codex-title');
        const codexSource = document.getElementById('codex-source');
        const codexArt = document.getElementById('codex-art');
        const btnCloseCodex = document.getElementById('btn-close-codex');
        const btnLaunchUplink = document.getElementById('btn-launch-uplink');

        // Permanent saved web links
        let savedStreams = JSON.parse(localStorage.getItem('experimental-stream-grid')) || [];
        
        // Temporary session blobs (for local files from PC/Phone)
        let sessionStreams = []; 

        let currentlySelectedUrl = null;
        let currentObjectURL = null; // Used to clean up memory when switching videos

        function cleanTitleForSearch(filename) {
            let clean = filename.replace(/\.[a-zA-Z0-9]+$/, ''); 
            clean = clean.replace(/[\._\-]/g, ' '); 
            clean = clean.replace(/(1080p|720p|4k|bluray|x264|webrip|hd|cam)/ig, ''); 
            return clean.trim();
        }

        async function fetchPoster(title, cardElement) {
            try {
                const searchTitle = cleanTitleForSearch(title);
                const response = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(searchTitle)}&entity=movie&limit=1`);
                const data = await response.json();
                
                if (data.results && data.results.length > 0) {
                    let highResUrl = data.results[0].artworkUrl100.replace('100x100bb', '600x600bb');
                    cardElement.style.backgroundImage = `url('${highResUrl}')`;
                    cardElement.dataset.artUrl = highResUrl; 
                }
            } catch (e) { console.log("Poster API timeout for: " + title); }
        }

        function renderLibrary() {
            gridDiv.innerHTML = '';
            
            // Combine both permanent URLs and temporary local files for the grid
            let displayList = [];
            savedStreams.forEach((url, idx) => displayList.push({ url: url, name: url.split('/').pop().split('?')[0], isLocal: false, savedIdx: idx }));
            sessionStreams.forEach((item, idx) => displayList.push({ url: item.url, name: item.name, isLocal: true, sessionIdx: idx }));

            if(displayList.length === 0) {
                gridDiv.innerHTML = '<p style="color:#86868b; grid-column: 1 / -1; margin-top: 60px; text-align: center; font-size: 15px;">Your library is empty. Import a playlist or add local media.</p>';
                return;
            }

            displayList.forEach((item, index) => {
                let displayName = decodeURIComponent(item.name);
                if (!displayName || displayName.length < 2) displayName = "Media Stream";

                const card = document.createElement('div');
                card.className = 'video-card hitbox'; 
                card.dataset.artUrl = ""; 

                const overlay = document.createElement('div');
                overlay.className = 'card-overlay';

                const contentWrapper = document.createElement('div');
                contentWrapper.className = 'card-content';

                const titleSpan = document.createElement('div');
                titleSpan.className = 'card-title';
                titleSpan.innerText = cleanTitleForSearch(displayName);
                
                const metaSpan = document.createElement('div');
                metaSpan.className = 'card-meta';
                metaSpan.innerText = item.isLocal ? 'LOCAL FILE (SESSION)' : 'WEB STREAM';
                if(item.isLocal) metaSpan.style.color = '#0A84FF';

                const delBtn = document.createElement('button');
                delBtn.className = 'btn-del-card hitbox';
                delBtn.innerText = '✕';
                
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    if (item.isLocal) {
                        URL.revokeObjectURL(item.url); // Clean browser memory
                        sessionStreams.splice(item.sessionIdx, 1);
                    } else {
                        savedStreams.splice(item.savedIdx, 1);
                        localStorage.setItem('experimental-stream-grid', JSON.stringify(savedStreams));
                    }
                    if (currentlySelectedUrl === item.url) closeCodex();
                    renderLibrary();
                };

                card.onclick = () => openCodex(cleanTitleForSearch(displayName), item.url, item.isLocal, card.dataset.artUrl);

                contentWrapper.appendChild(titleSpan);
                contentWrapper.appendChild(metaSpan);
                
                card.appendChild(overlay);
                card.appendChild(delBtn);
                card.appendChild(contentWrapper);
                gridDiv.appendChild(card);

                fetchPoster(displayName, card);
            });
        }

        function openCodex(title, url, isLocal, artUrl) {
            currentlySelectedUrl = url;
            codexTitle.innerText = title;
            codexSource.innerText = isLocal ? "Local Device Storage" : "Remote Web Server";
            codexSource.style.color = isLocal ? "#0A84FF" : "#fff";
            
            if (artUrl) {
                codexArt.style.display = 'block';
                codexArt.style.backgroundImage = `url('${artUrl}')`;
            } else {
                codexArt.style.display = 'none';
            }
            
            codexPanel.classList.add('active');
        }

        function closeCodex() {
            currentlySelectedUrl = null;
            codexPanel.classList.remove('active');
            setTimeout(() => { codexArt.style.display = 'none'; }, 400); 
        }

        btnCloseCodex.addEventListener('click', closeCodex);

        btnLaunchUplink.addEventListener('click', () => {
            if (currentlySelectedUrl) launchStream(currentlySelectedUrl);
        });

        // --- THE LOCAL MEDIA HANDLER ---
        btnLocalTrigger.addEventListener('click', () => { localInput.click(); });
        
        localInput.addEventListener('change', (e) => {
            const files = e.target.files;
            if (!files.length) return;
            
            for (let file of files) {
                // Generates a temporary blob URL that WebRTC and Video tags can play
                const blobUrl = URL.createObjectURL(file);
                sessionStreams.push({ url: blobUrl, name: file.name });
            }
            
            renderLibrary();
            localInput.value = ''; 
        });

        // --- WEB ADD & IMPORT HANDLERS ---
        btnAdd.addEventListener('click', () => {
            const url = input.value.trim();
            if(!url) return;
            if(!savedStreams.includes(url)) {
                savedStreams.push(url);
                localStorage.setItem('experimental-stream-grid', JSON.stringify(savedStreams));
            }
            input.value = '';
            renderLibrary();
        });

        btnImportTrigger.addEventListener('click', () => { txtInput.click(); });

        txtInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const text = event.target.result;
                const lines = text.split(/\r?\n/);
                let newLinksCount = 0;

                lines.forEach(line => {
                    const cleanUrl = line.trim();
                    if (cleanUrl.startsWith('http') && !savedStreams.includes(cleanUrl)) {
                        savedStreams.push(cleanUrl);
                        newLinksCount++;
                    }
                });

                if (newLinksCount > 0) {
                    localStorage.setItem('experimental-stream-grid', JSON.stringify(savedStreams));
                    renderLibrary();
                    btnImportTrigger.style.background = 'rgba(50, 215, 75, 0.1)';
                    btnImportTrigger.style.borderColor = '#32d74b';
                    btnImportTrigger.style.color = '#32d74b';
                    btnImportTrigger.innerText = `Imported ${newLinksCount} items`;
                    setTimeout(() => {
                        btnImportTrigger.style.background = '';
                        btnImportTrigger.style.borderColor = '';
                        btnImportTrigger.style.color = '';
                        btnImportTrigger.innerText = '📁 Import Playlist';
                    }, 3000);
                }
            };
            reader.readAsText(file);
            txtInput.value = ''; 
        });

        // SCROLL BUTTONS
        btnUp.addEventListener('click', () => {
            gridDiv.scrollTop -= 350;
            btnUp.style.background = 'rgba(255,255,255,0.15)';
            setTimeout(() => btnUp.style.background = '', 200);
        });
        btnDown.addEventListener('click', () => {
            gridDiv.scrollTop += 350;
            btnDown.style.background = 'rgba(255,255,255,0.15)';
            setTimeout(() => btnDown.style.background = '', 200);
        });

        function launchStream(url) {
            ui.style.display = 'none';
            video.style.display = 'block';
            video.src = url;
            video.volume = 1.0;
            video.play().catch(e => console.log("Awaiting interaction..."));
            exitHint.style.opacity = '1';
            setTimeout(() => exitHint.style.opacity = '0', 3000);
        }

        let clickTimer = null;
        video.addEventListener('click', (e) => {
            if (e.detail === 1) {
                clickTimer = setTimeout(() => { video.paused ? video.play() : video.pause(); }, 250);
            } else if (e.detail === 2) {
                clearTimeout(clickTimer);
                video.pause(); video.src = ''; video.style.display = 'none'; ui.style.display = 'flex';
                closeCodex(); 
            }
        });

        window.addEventListener('message', (event) => {
            if(!event.data || !event.data.cmd) return;
            if (event.data.cmd === 'playpause') video.paused ? video.play() : video.pause();
            else if (event.data.cmd === 'seekFwd') video.currentTime = Math.min(video.duration, video.currentTime + 15);
            else if (event.data.cmd === 'seekBack') video.currentTime = Math.max(0, video.currentTime - 15);
            else if (event.data.cmd === 'exitTheater') {
                video.pause(); video.src = ''; video.style.display = 'none'; ui.style.display = 'flex';
                closeCodex();
            }
        });

        renderLibrary();
    </script>
</body>
</html>
