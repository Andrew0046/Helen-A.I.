<!DOCTYPE html>
<html>
<head>
    <title>Helen's Enchanted Forest Odyssey</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; touch-action: none; user-select: none; -webkit-user-select: none; }
        canvas { width: 100vw; height: 100vh; touch-action: none; display: block; outline: none; }
        
        #ui { position: absolute; top: 20px; width: 100%; text-align: center; color: #00ffcc; font-family: monospace; font-size: 1.5rem; z-index: 10; pointer-events: none; text-shadow: 0 0 15px rgba(0,255,204,0.8); }
        #crystal-counter { position: absolute; top: 70px; left: 30px; color: #ff00ff; font-family: monospace; font-size: 1.4rem; z-index: 10; pointer-events: none; text-shadow: 0 0 10px rgba(255,0,255,0.9); }
        #win-screen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); display: none; flex-direction: column; 
            justify-content: center; align-items: center; color: #00ffcc; 
            font-family: monospace; font-size: 3rem; text-align: center; z-index: 100;
            text-shadow: 0 0 30px #00ffcc;
        }
        
        #interaction-prompt {
            position: absolute; top: 120px; width: 100%; text-align: center; 
            color: #ff00ff; font-family: monospace; font-size: 1.6rem; font-weight: bold;
            z-index: 10; pointer-events: none; text-shadow: 0 0 20px rgba(255,0,255,0.9);
            opacity: 0; transition: opacity 0.4s ease;
        }

        /* MOBILE UI */
        #mobile-controls { display: none; }
        #joystick-base {
            position: absolute; bottom: 40px; left: 40px; width: 130px; height: 130px;
            background: rgba(255,255,255,0.06); border: 3px solid rgba(0,255,204,0.3);
            border-radius: 50%; z-index: 100; touch-action: none; display: none;
        }
        #joystick-stick {
            position: absolute; top: 40px; left: 40px; width: 50px; height: 50px;
            background: rgba(0,255,204,0.7); border-radius: 50%; box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }
        
        .action-button {
            position: absolute; background: rgba(255,255,255,0.08); border: 3px solid rgba(255,255,255,0.35);
            border-radius: 50%; z-index: 100; color: white; font-family: monospace; font-weight: bold;
            display: flex; justify-content: center; align-items: center; touch-action: none;
        }
        #run-button { bottom: 40px; right: 130px; width: 75px; height: 75px; font-size: 13px; }
        #jump-button { bottom: 110px; right: 40px; width: 85px; height: 85px; font-size: 19px; background: rgba(0,255,204,0.25); }
    </style>
</head>
<body>
    <div id="ui">HELEN'S ENCHANTED FOREST ODYSSEY</div>
    <div id="crystal-counter">CRYSTALS: <span id="count">0</span>/3</div>
    <div id="interaction-prompt">THE CRYSTAL CALLS...</div>
    <canvas id="renderCanvas"></canvas>

    <div id="mobile-controls">
        <div id="joystick-base"><div id="joystick-stick"></div></div>
        <div id="run-button" class="action-button">SPRINT</div>
        <div id="jump-button" class="action-button">JUMP</div>
    </div>

    <div id="win-screen">
        <div>🌲 VICTORY! 🌲</div>
        <div style="font-size:1.4rem; margin-top:20px;">You collected all the crystals!<br>Helen thanks you ❤️</div>
    </div>

    <script>
        window.addEventListener("contextmenu", e => e.preventDefault());

        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true, { adaptToDeviceRatio: true });
        engine.setHardwareScalingLevel(1 / window.devicePixelRatio);

        const promptUI = document.getElementById("interaction-prompt");
        const counterUI = document.getElementById("count");
        const winScreen = document.getElementById("win-screen");

        // Mobile controls
        const joyBase = document.getElementById("joystick-base");
        const joyStick = document.getElementById("joystick-stick");
        const runBtn = document.getElementById("run-button");
        const jumpBtn = document.getElementById("jump-button");
        const mobileControls = document.getElementById("mobile-controls");
        
        let touchMoveX = 0, touchMoveZ = 0, isTouchRunning = false, isTouchJumping = false;
        let joyCenterX = 0, joyCenterY = 0;

        if ('ontouchstart' in window || navigator.maxTouchPoints > 0) mobileControls.style.display = "block";

        function updateJoystick(clientX, clientY) {
            let dx = clientX - joyCenterX;
            let dy = clientY - joyCenterY;
            let distance = Math.sqrt(dx*dx + dy*dy);
            let maxDist = 45;
            if (distance > maxDist) { dx = (dx / distance) * maxDist; dy = (dy / distance) * maxDist; }
            joyStick.style.transform = `translate(${dx}px, ${dy}px)`;
            touchMoveX = dx / maxDist;
            touchMoveZ = dy / maxDist;
        }

        runBtn.addEventListener("pointerdown", e => { e.preventDefault(); isTouchRunning = true; runBtn.style.background = "rgba(0,255,204,0.8)"; });
        runBtn.addEventListener("pointerup", e => { e.preventDefault(); isTouchRunning = false; runBtn.style.background = "rgba(255,255,255,0.08)"; });
        runBtn.addEventListener("pointerleave", () => { isTouchRunning = false; runBtn.style.background = "rgba(255,255,255,0.08)"; });

        jumpBtn.addEventListener("pointerdown", e => { e.preventDefault(); isTouchJumping = true; jumpBtn.style.background = "rgba(0,255,204,0.9)"; });
        jumpBtn.addEventListener("pointerup", e => { e.preventDefault(); isTouchJumping = false; jumpBtn.style.background = "rgba(0,255,204,0.25)"; });
        jumpBtn.addEventListener("pointerleave", () => { isTouchJumping = false; jumpBtn.style.background = "rgba(0,255,204,0.25)"; });

        const createScene = async function () {
            const scene = new BABYLON.Scene(engine);
            scene.clearColor = new BABYLON.Color3(0.01, 0.03, 0.08);
            scene.fogMode = BABYLON.Scene.FOGMODE_EXP2;
            scene.fogDensity = 0.0028;
            scene.fogColor = new BABYLON.Color3(0.15, 0.25, 0.4);

            // Lights
            const sun = new BABYLON.DirectionalLight("sun", new BABYLON.Vector3(-0.6, -1, -0.4), scene);
            sun.intensity = 1.1;
            sun.diffuse = new BABYLON.Color3(1, 0.95, 0.85);

            const rim = new BABYLON.SpotLight("rim", new BABYLON.Vector3(15, 25, -20), new BABYLON.Vector3(-0.5, -1, 0.8), Math.PI/3, 2, scene);
            rim.diffuse = new BABYLON.Color3(0.6, 0.3, 1);
            rim.intensity = 1.8;

            // BEAUTIFUL SKYBOX + ENVIRONMENT
            const env = scene.createDefaultEnvironment({
                createGround: false,
                skyboxSize: 1800,
                skyboxColor: new BABYLON.Color3(0.05, 0.1, 0.25)
            });
            env.skybox.material.diffuseColor = new BABYLON.Color3(0.08, 0.12, 0.3);

            // BIG TERRAIN
            const ground = BABYLON.MeshBuilder.CreateGround("ground", {width: 520, height: 520, subdivisions: 120, updatable: true}, scene);
            const positions = ground.getVerticesData(BABYLON.VertexBuffer.PositionKind);
            for (let i = 0; i < positions.length; i += 3) {
                const x = positions[i];
                const z = positions[i + 2];
                positions[i + 1] = Math.sin(x/18)*5.5 + Math.cos(z/15)*4.8 + Math.sin((x+z)/6)*1.8;
            }
            ground.setVerticesData(BABYLON.VertexBuffer.PositionKind, positions);
            BABYLON.VertexData.ComputeNormals(positions, ground.getIndices(), ground.getVerticesData(BABYLON.VertexBuffer.NormalKind));

            const groundMat = new BABYLON.StandardMaterial("groundMat", scene);
            groundMat.diffuseColor = new BABYLON.Color3(0.035, 0.08, 0.04);
            groundMat.specularColor = new BABYLON.Color3(0.05, 0.05, 0.05);
            ground.material = groundMat;

            // === TREES (3 VARIATIONS) ===
            const trees = [];
            function createTree(x, z, type) {
                const tree = new BABYLON.TransformNode("tree", scene);
                let trunkH = 5.5, leafSize = 4.2;

                if (type === 1) { trunkH = 7; leafSize = 3.8; }      // tall pine
                if (type === 2) { trunkH = 4; leafSize = 5; }        // bushy

                const trunk = BABYLON.MeshBuilder.CreateCylinder("trunk", {height: trunkH, diameter: 1.1}, scene);
                trunk.position.y = trunkH/2;
                const tMat = new BABYLON.StandardMaterial("tMat", scene);
                tMat.diffuseColor = new BABYLON.Color3(0.35, 0.22, 0.1);
                trunk.material = tMat;

                const leaves = BABYLON.MeshBuilder.CreateSphere("leaves", {diameter: leafSize}, scene);
                leaves.position.y = trunkH + 1.5;
                leaves.scaling.set(1, 0.65, 1);
                const lMat = new BABYLON.StandardMaterial("lMat", scene);
                lMat.diffuseColor = type === 2 ? new BABYLON.Color3(0.05, 0.55, 0.2) : new BABYLON.Color3(0.08, 0.42, 0.18);
                leaves.material = lMat;

                trunk.parent = tree;
                leaves.parent = tree;

                const scale = 0.85 + Math.random() * 0.45;
                tree.scaling.set(scale, scale * (type === 1 ? 1.15 : 0.95), scale);
                tree.rotation.y = Math.random() * Math.PI * 2;

                const height = ground.getHeightAtCoordinates(x, z);
                tree.position.set(x, height, z);
                trees.push(tree);
                return tree;
            }

            for (let i = 0; i < 65; i++) {
                const x = (Math.random() - 0.5) * 480;
                const z = (Math.random() - 0.5) * 480;
                if (Math.abs(x) < 40 && Math.abs(z) < 40) continue;
                const type = Math.random() > 0.6 ? 1 : (Math.random() > 0.5 ? 2 : 0);
                createTree(x, z, type);
            }

            // === 3 COLLECTIBLE CRYSTALS ===
            let crystals = [];
            let collected = 0;
            function spawnCrystal() {
                const c = BABYLON.MeshBuilder.CreateCylinder("crystal", {height: 9, diameterTop: 0.15, diameterBottom: 3.2, tessellation: 6}, scene);
                let x, z;
                do {
                    x = (Math.random() - 0.5) * 420;
                    z = (Math.random() - 0.5) * 420;
                } while (Math.abs(x) < 60 && Math.abs(z) < 60);
                
                const y = ground.getHeightAtCoordinates(x, z) + 5;
                c.position.set(x, y, z);
                
                const mat = new BABYLON.StandardMaterial("cMat", scene);
                mat.emissiveColor = new BABYLON.Color3(0.1, 0.9, 1);
                mat.diffuseColor = new BABYLON.Color3(0.3, 0.8, 1);
                c.material = mat;

                const light = new BABYLON.PointLight("cLight", c.position, scene);
                light.diffuse = new BABYLON.Color3(0.1, 0.9, 1);
                light.intensity = 3;
                light.range = 35;

                const ps = new BABYLON.ParticleSystem("ps", 1200, scene);
                ps.particleTexture = new BABYLON.Texture("https://textures.babylonjs.com/flare.png", scene);
                ps.emitter = c;
                ps.minEmitBox = new BABYLON.Vector3(-2, -4, -2);
                ps.maxEmitBox = new BABYLON.Vector3(2, -4, 2);
                ps.color1 = new BABYLON.Color4(0.2, 1, 1, 1);
                ps.color2 = new BABYLON.Color4(0.6, 0.8, 1, 1);
                ps.colorDead = new BABYLON.Color4(0, 0.3, 1, 0);
                ps.minSize = 0.15; ps.maxSize = 0.45;
                ps.minLifeTime = 1.2; ps.maxLifeTime = 3.5;
                ps.emitRate = 70;
                ps.direction1 = new BABYLON.Vector3(-0.6, 1.5, -0.6);
                ps.direction2 = new BABYLON.Vector3(0.6, 2.5, 0.6);
                ps.gravity = new BABYLON.Vector3(0, 0.4, 0);
                ps.start();

                crystals.push({mesh: c, light: light, ps: ps, mat: mat});
                return c;
            }

            for (let i = 0; i < 3; i++) spawnCrystal();

            // === HELEN ===
            const result = await BABYLON.SceneLoader.ImportMeshAsync("", "https://raw.githubusercontent.com/Andrew0046/Helen-A.I./main/", "Helen1.glb", scene);
            const hero = result.meshes[0];
            result.animationGroups.forEach(anim => anim.stop());

            const bones = { leftArm:null, rightArm:null, leftLeg:null, rightLeg:null, spine:null };
            let hairBones = [];
            
            result.transformNodes.forEach(node => {
                if (node.name === 'J_Bip_C_Spine') bones.spine = node;
                if (node.name === 'J_Bip_L_UpperArm') bones.leftArm = node;
                if (node.name === 'J_Bip_R_UpperArm') bones.rightArm = node;
                if (node.name === 'J_Bip_L_UpperLeg') bones.leftLeg = node;
                if (node.name === 'J_Bip_R_UpperLeg') bones.rightLeg = node;
                if (node.name.includes('J_Sec_Hair')) hairBones.push({bone: node, baseRot: node.rotation ? node.rotation.clone() : new BABYLON.Vector3()});
            });

            hero.rotationQuaternion = null; // one-time fix

            let blinkTarget = null;
            result.meshes.forEach(m => {
                if (m.morphTargetManager) {
                    for (let i = 0; i < m.morphTargetManager.numTargets; i++) {
                        if (m.morphTargetManager.getTarget(i).name === "Fcl_EYE_Close") blinkTarget = m.morphTargetManager.getTarget(i);
                    }
                }
            });

            let blinkState = { isBlinking: false, value: 0, nextTime: Date.now() + 2800 };

            // Camera
            const camAnchor = new BABYLON.TransformNode("camAnchor", scene);
            camAnchor.parent = hero;
            camAnchor.position.y = 1.4;
            const camera = new BABYLON.ArcRotateCamera("camera", -Math.PI/2, Math.PI/3.1, 6, camAnchor, scene);
            camera.lowerRadiusLimit = 2.5;
            camera.upperBetaLimit = Math.PI / 2.05;
            camera.fov = 0.85;

            const pipeline = new BABYLON.DefaultRenderingPipeline("default", true, scene, [camera]);
            pipeline.bloomEnabled = true;
            pipeline.bloomThreshold = 0.65;
            pipeline.bloomWeight = 0.55;

            // Touch swipe controls
            let joystickPointerId = null;
            let cameraPointerId = null;
            let lastCamX = 0, lastCamY = 0;

            scene.onPointerObservable.add((pointerInfo) => {
                const e = pointerInfo.event;
                const half = engine.getRenderWidth() / 2;
                if (pointerInfo.type === BABYLON.PointerEventTypes.POINTERDOWN) {
                    if (e.target === runBtn || e.target === jumpBtn) return;
                    if (e.clientX < half && joystickPointerId === null) {
                        joystickPointerId = e.pointerId;
                        joyCenterX = e.clientX; joyCenterY = e.clientY;
                        joyBase.style.left = `${joyCenterX-65}px`;
                        joyBase.style.top = `${joyCenterY-65}px`;
                        joyBase.style.display = "block";
                        updateJoystick(e.clientX, e.clientY);
                    } else if (e.clientX >= half && cameraPointerId === null) {
                        cameraPointerId = e.pointerId;
                        lastCamX = e.clientX; lastCamY = e.clientY;
                    }
                }
                if (pointerInfo.type === BABYLON.PointerEventTypes.POINTERMOVE) {
                    if (e.pointerId === joystickPointerId) updateJoystick(e.clientX, e.clientY);
                    else if (e.pointerId === cameraPointerId) {
                        camera.inertialAlphaOffset -= (e.clientX - lastCamX) * 0.0052;
                        camera.inertialBetaOffset -= (e.clientY - lastCamY) * 0.0052;
                        lastCamX = e.clientX; lastCamY = e.clientY;
                    }
                }
                if (pointerInfo.type === BABYLON.PointerEventTypes.POINTERUP) {
                    if (e.pointerId === joystickPointerId) { joystickPointerId = null; joyBase.style.display = "none"; touchMoveX = 0; touchMoveZ = 0; }
                    else if (e.pointerId === cameraPointerId) cameraPointerId = null;
                }
            });

            // Keyboard + Gamepad
            const inputMap = {};
            scene.actionManager = new BABYLON.ActionManager(scene);
            scene.actionManager.registerAction(new BABYLON.ExecuteCodeAction(BABYLON.ActionManager.OnKeyDownTrigger, e => inputMap[e.sourceEvent.key.toLowerCase()] = true));
            scene.actionManager.registerAction(new BABYLON.ExecuteCodeAction(BABYLON.ActionManager.OnKeyUpTrigger, e => inputMap[e.sourceEvent.key.toLowerCase()] = false));

            const gamepadManager = new BABYLON.GamepadManager();
            let controller = null;
            gamepadManager.onGamepadConnectedObservable.add(g => controller = g);

            // === RUNNING DUST TRAIL ===
            const dustPS = new BABYLON.ParticleSystem("dust", 400, scene);
            dustPS.particleTexture = new BABYLON.Texture("https://textures.babylonjs.com/flare.png", scene);
            dustPS.emitter = hero;
            dustPS.minEmitBox = new BABYLON.Vector3(-0.8, 0.1, -0.8);
            dustPS.maxEmitBox = new BABYLON.Vector3(0.8, 0.1, 0.8);
            dustPS.color1 = new BABYLON.Color4(0.8, 0.8, 0.7, 0.6);
            dustPS.color2 = new BABYLON.Color4(0.6, 0.6, 0.5, 0.3);
            dustPS.colorDead = new BABYLON.Color4(0.4, 0.4, 0.4, 0);
            dustPS.minSize = 0.2; dustPS.maxSize = 0.6;
            dustPS.minLifeTime = 0.6; dustPS.maxLifeTime = 1.4;
            dustPS.emitRate = 0;
            dustPS.direction1 = new BABYLON.Vector3(-1, 1, -1);
            dustPS.direction2 = new BABYLON.Vector3(1, 2, 1);
            dustPS.gravity = new BABYLON.Vector3(0, -2, 0);
            dustPS.start();

            // === GAME LOOP VARS ===
            let walkAccumulator = 0;
            let smoothSpeed = 0;
            let velocityY = 0;
            const gravity = -0.028;
            const jumpPower = 0.48;
            const colorCyan = new BABYLON.Color3(0, 0.85, 1);
            const colorMagenta = new BABYLON.Color3(1, 0.1, 1);

            scene.onBeforeRenderObservable.add(() => {
                const delta = engine.getDeltaTime() / 1000;
                const speedFactor = delta * 68; // normalized to ~60fps feel

                let moveX = 0, moveZ = 0;
                let isRunning = inputMap["shift"] || (controller && controller.browserGamepad.buttons[10]?.pressed) || isTouchRunning;
                let isJumpingPressed = inputMap[" "] || (controller && controller.browserGamepad.buttons[0]?.pressed) || isTouchJumping;

                // Keyboard
                if (inputMap["w"]) moveZ -= 1;
                if (inputMap["s"]) moveZ += 1;
                if (inputMap["a"]) moveX += 1;
                if (inputMap["d"]) moveX -= 1;

                // Gamepad left stick
                if (controller && controller.leftStick) {
                    if (Math.abs(controller.leftStick.x) > 0.12) moveX -= controller.leftStick.x;
                    if (Math.abs(controller.leftStick.y) > 0.12) moveZ -= controller.leftStick.y;
                }

                // Touch joystick
                if (touchMoveX !== 0) moveX -= touchMoveX;
                if (touchMoveZ !== 0) moveZ += touchMoveZ;

                // Normalize direction
                let len = Math.sqrt(moveX*moveX + moveZ*moveZ);
                if (len > 0) {
                    moveX /= len;
                    moveZ /= len;
                }

                // Sprint
                if (isRunning) {
                    moveX *= 1.85;
                    moveZ *= 1.85;
                }

                const currentSpeed = Math.sqrt(moveX*moveX + moveZ*moveZ);
                smoothSpeed = BABYLON.Scalar.Lerp(smoothSpeed, currentSpeed, 0.12);

                // === MOVEMENT ===
                if (currentSpeed > 0.01) {
                    const forward = camera.getFrontPosition(1).subtract(camera.position);
                    forward.y = 0; forward.normalize();
                    const right = BABYLON.Vector3.Cross(new BABYLON.Vector3(0,1,0), forward).normalize();
                    const dir = forward.scale(moveZ).add(right.scale(-moveX));
                    
                    hero.position.addInPlace(dir.scale(speedFactor * 0.085));
                    hero.rotationQuaternion = null;
                    hero.rotation.y = Math.atan2(dir.x, dir.z) + Math.PI;
                }

                // === JUMP + GRAVITY ===
                const groundHeight = ground.getHeightAtCoordinates(hero.position.x, hero.position.z);
                const isGrounded = hero.position.y <= groundHeight + 0.08;

                if (isGrounded) {
                    if (isJumpingPressed) velocityY = jumpPower;
                    else { hero.position.y = groundHeight; velocityY = 0; }
                } else {
                    velocityY += gravity * speedFactor;
                }
                hero.position.y += velocityY * speedFactor;

                // Dust trail intensity
                dustPS.emitRate = isRunning && smoothSpeed > 0.3 && isGrounded ? 180 : 0;

                // Camera terrain follow
                let camGround = ground.getHeightAtCoordinates(camera.position.x, camera.position.z);
                if (camera.position.y < camGround + 0.8) camera.radius = BABYLON.Scalar.Lerp(camera.radius, camera.radius - 1.2, 0.25);
                else if (camera.radius < 6) camera.radius = BABYLON.Scalar.Lerp(camera.radius, 6, 0.08);

                // === CRYSTAL COLLECTION + PULSE ===
                let nearAny = false;
                crystals.forEach((c, i) => {
                    const dist = BABYLON.Vector3.Distance(hero.position, c.mesh.position);
                    if (dist < 7) {
                        nearAny = true;
                        c.mesh.scaling.set(1.15 + Math.sin(Date.now()/180)*0.08, 1.15 + Math.sin(Date.now()/220)*0.08, 1.15 + Math.sin(Date.now()/180)*0.08);
                        c.mat.emissiveColor = BABYLON.Color3.Lerp(c.mat.emissiveColor, colorMagenta, 0.1);
                        
                        if (dist < 4.5) {
                            // COLLECT!
                            collected++;
                            counterUI.textContent = collected;
                            c.ps.stop();
                            c.light.intensity = 0;
                            c.mesh.dispose();
                            crystals.splice(i, 1);
                            
                            if (collected >= 3) {
                                winScreen.style.display = "flex";
                            } else {
                                // spawn new one
                                setTimeout(() => spawnCrystal(), 800);
                            }
                        }
                    } else {
                        c.mesh.rotation.y += 0.015 * speedFactor;
                        c.mat.emissiveColor = BABYLON.Color3.Lerp(c.mat.emissiveColor, colorCyan, 0.08);
                    }
                });

                promptUI.style.opacity = nearAny ? "1" : "0";

                // Procedural walk animation
                const time = Date.now() * 0.001;
                if (smoothSpeed > 0.02 && isGrounded) {
                    walkAccumulator += smoothSpeed * 240 * delta;
                    const wc = walkAccumulator;
                    const legAmp = isRunning ? 0.75 : 0.42;
                    const armAmp = isRunning ? 0.55 : 0.23;

                    if (bones.leftLeg) bones.leftLeg.rotation.x = Math.sin(wc) * legAmp;
                    if (bones.rightLeg) bones.rightLeg.rotation.x = Math.sin(wc + Math.PI) * legAmp;
                    if (bones.leftArm) { bones.leftArm.rotation.z = -1.25; bones.leftArm.rotation.x = Math.sin(wc + Math.PI) * armAmp; }
                    if (bones.rightArm) { bones.rightArm.rotation.z = 1.25; bones.rightArm.rotation.x = Math.sin(wc) * armAmp; }
                    if (bones.spine) bones.spine.rotation.y = Math.cos(wc) * 0.09;
                } else {
                    walkAccumulator = 0;
                    const breath = isGrounded ? Math.sin(time * 2.8) * 0.035 : 0;
                    if (bones.leftLeg) bones.leftLeg.rotation.x = BABYLON.Scalar.Lerp(bones.leftLeg.rotation.x, 0, 0.15);
                    if (bones.rightLeg) bones.rightLeg.rotation.x = BABYLON.Scalar.Lerp(bones.rightLeg.rotation.x, 0, 0.15);
                    if (bones.leftArm) { bones.leftArm.rotation.z = BABYLON.Scalar.Lerp(bones.leftArm.rotation.z, -1.25, 0.15); bones.leftArm.rotation.x = BABYLON.Scalar.Lerp(bones.leftArm.rotation.x, 0, 0.15); }
                    if (bones.rightArm) { bones.rightArm.rotation.z = BABYLON.Scalar.Lerp(bones.rightArm.rotation.z, 1.25, 0.15); bones.rightArm.rotation.x = BABYLON.Scalar.Lerp(bones.rightArm.rotation.x, 0, 0.15); }
                    if (bones.spine) bones.spine.rotation.x = breath;
                }

                // Hair wind
                const wind = Math.sin(time * 2.2) * 0.035;
                hairBones.forEach(h => {
                    let target = h.baseRot.x + wind + (smoothSpeed * 0.55) - (velocityY * 1.8);
                    h.bone.rotation.x = BABYLON.Scalar.Lerp(h.bone.rotation.x, target, 0.13);
                });

                // Blinking
                if (blinkTarget) {
                    if (blinkState.isBlinking) {
                        blinkState.value += 0.32 * speedFactor;
                        if (blinkState.value >= 1) { blinkState.value = 1; blinkState.isBlinking = false; }
                    } else {
                        blinkState.value -= 0.14 * speedFactor;
                        if (blinkState.value <= 0) {
                            blinkState.value = 0;
                            if (Date.now() > blinkState.nextTime) {
                                blinkState.isBlinking = true;
                                blinkState.nextTime = Date.now() + 2600 + Math.random() * 2200;
                            }
                        }
                    }
                    blinkTarget.influence = Math.max(0, Math.min(1, blinkState.value));
                }

                camera.fov = BABYLON.Scalar.Lerp(camera.fov, isRunning && smoothSpeed > 0.1 ? 1.08 : 0.85, 0.07);
            });

            return scene;
        };

        createScene().then(scene => {
            engine.runRenderLoop(() => scene.render());
        });

        window.addEventListener("resize", () => setTimeout(() => engine.resize(), 80));
        window.addEventListener("orientationchange", () => setTimeout(() => engine.resize(), 180));
    </script>
</body>
</html>
