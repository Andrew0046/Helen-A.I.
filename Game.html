<!DOCTYPE html>
<html>
<head>
    <title>Helen's Epic Adventure: Hybrid Engine v2</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; }
        canvas { width: 100vw; height: 100vh; display: block; }
        #ui {
            position: absolute; bottom: 20px; width: 100%; text-align: center;
            color: #ff0055; font-family: monospace; text-shadow: 0 0 15px #ff0055;
            pointer-events: none; font-size: 1.1em;
        }
    </style>
</head>
<body>
    <div id="ui">WASD / Left Stick + Shift / L3 to Run | Hybrid Procedural Animation v2</div>
    <canvas id="renderCanvas"></canvas>

    <script>
        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true);

        const createScene = async function () {
            const scene = new BABYLON.Scene(engine);
            scene.clearColor = new BABYLON.Color3(0.015, 0.015, 0.025);
            scene.fogMode = BABYLON.Scene.FOGMODE_EXP2;
            scene.fogDensity = 0.018;
            scene.fogColor = new BABYLON.Color3(0.015, 0.015, 0.025);

            // Dramatic lighting
            const sun = new BABYLON.DirectionalLight("sun", new BABYLON.Vector3(-0.7, -1.1, -0.7), scene);
            sun.intensity = 1.7;
            const rim = new BABYLON.SpotLight("rim", new BABYLON.Vector3(7, 9, -6), new BABYLON.Vector3(-0.6, -1, 0.4), Math.PI / 3, 2, scene);
            rim.diffuse = new BABYLON.Color3(1, 0.15, 0.45);

            // Ground
            const ground = BABYLON.MeshBuilder.CreateGround("ground", { width: 200, height: 200 }, scene);
            const gMat = new BABYLON.StandardMaterial("gMat", scene);
            gMat.diffuseColor = new BABYLON.Color3(0.07, 0.08, 0.07);
            gMat.specularColor = new BABYLON.Color3(0.15, 0.15, 0.15);
            ground.material = gMat;
            ground.receiveShadows = true;

            // === 1. Load Helen ===
            const result = await BABYLON.SceneLoader.ImportMeshAsync("", "https://raw.githubusercontent.com/Andrew0046/Helen-A.I./main/", "Helen1.glb", scene);
            const hero = result.meshes[0];
            hero.scaling.scaleInPlace(1.0); // tweak if needed

            // === 2. ROBUST BONE MAPPING (works with Mixamo rigs) ===
            const bones = {};
            const boneMap = {
                leftLeg: ["leftupleg", "leftleg", "leg_l", "upleg_l", "left_upper_leg"],
                rightLeg: ["rightupleg", "rightleg", "leg_r", "upleg_r", "right_upper_leg"],
                leftArm: ["leftupperarm", "leftarm", "arm_l", "upperarm_l", "left_upper_arm"],
                rightArm: ["rightupperarm", "rightarm", "arm_r", "upperarm_r", "right_upper_arm"],
                spine: ["spine", "spine1", "spine2", "hips"]
            };

            result.transformNodes.forEach(node => {
                const n = node.name.toLowerCase();
                for (let key in boneMap) {
                    if (boneMap[key].some(term => n.includes(term))) bones[key] = node;
                }
            });

            console.log("✅ Bones mapped:", Object.keys(bones));

            // Clear quaternion lock ONCE (critical fix)
            Object.values(bones).forEach(b => b && (b.rotationQuaternion = null));

            // === 3. Shadows ===
            const shadowGenerator = new BABYLON.ShadowGenerator(2048, sun);
            shadowGenerator.useBlurExponentialShadowMap = true;
            shadowGenerator.blurKernel = 32;
            result.meshes.forEach(m => { if (m !== ground) shadowGenerator.addShadowCaster(m); });

            // === 4. Better Third-Person Camera (FollowCamera with spring) ===
            const camera = new BABYLON.FollowCamera("followCam", new BABYLON.Vector3(0, 8, -15), scene);
            camera.lockedTarget = hero;
            camera.heightOffset = 7;
            camera.cameraAcceleration = 0.08;
            camera.maxCameraSpeed = 10;
            camera.radius = 13;
            camera.rotationOffset = 180;

            // === 5. Inputs ===
            const inputMap = {};
            scene.actionManager = new BABYLON.ActionManager(scene);
            scene.actionManager.registerAction(new BABYLON.ExecuteCodeAction(BABYLON.ActionManager.OnKeyDownTrigger, e => inputMap[e.sourceEvent.key.toLowerCase()] = true));
            scene.actionManager.registerAction(new BABYLON.ExecuteCodeAction(BABYLON.ActionManager.OnKeyUpTrigger, e => inputMap[e.sourceEvent.key.toLowerCase()] = false));

            const gamepadManager = new BABYLON.GamepadManager();
            let controller = null;
            gamepadManager.onGamepadConnectedObservable.add(gp => controller = gp);

            // === 6. Movement Vars ===
            let velocity = new BABYLON.Vector3();
            let walkTime = 0;
            const baseSpeed = 0.13;

            // === 7. THE HYBRID GAME LOOP (massive upgrade) ===
            scene.onBeforeRenderObservable.add(() => {
                const delta = engine.getDeltaTime() / 1000;
                let moveDir = new BABYLON.Vector3();

                // Keyboard
                if (inputMap["w"]) moveDir.z -= 1;
                if (inputMap["s"]) moveDir.z += 1;
                if (inputMap["a"]) moveDir.x += 1;
                if (inputMap["d"]) moveDir.x -= 1;

                // Gamepad (analog!)
                if (controller?.leftStick) {
                    moveDir.x -= controller.leftStick.x;
                    moveDir.z -= controller.leftStick.y;
                }

                const isRunning = inputMap["shift"] || (controller && controller.browserGamepad?.buttons[10]?.pressed);

                // === CRITICAL FIX: Normalize + keep analog sensitivity ===
                const inputLength = moveDir.length();
                if (inputLength > 0.001) {
                    moveDir.normalize();
                    const targetSpeed = inputLength * (isRunning ? baseSpeed * 2.25 : baseSpeed);
                    const accel = moveDir.scale(targetSpeed);

                    velocity = BABYLON.Vector3.Lerp(velocity, accel, 0.22);
                } else {
                    velocity.scaleInPlace(0.78); // natural deceleration
                }

                const currentSpeed = velocity.length();

                // Apply movement
                if (currentSpeed > 0.01) {
                    hero.position.addInPlace(velocity);

                    // Smooth quaternion turning
                    const targetAngle = Math.atan2(velocity.x, velocity.z);
                    const targetQuat = BABYLON.Quaternion.RotationYawPitchRoll(targetAngle + Math.PI, 0, 0);
                    if (!hero.rotationQuaternion) hero.rotationQuaternion = BABYLON.Quaternion.Identity();
                    BABYLON.Quaternion.SlerpToRef(hero.rotationQuaternion, targetQuat, 0.28, hero.rotationQuaternion);
                }

                // === UPGRADED PROCEDURAL ANIMATION ===
                if (currentSpeed > 0.02) {
                    walkTime += currentSpeed * 310 * delta;

                    const legAmp = isRunning ? 1.15 : 0.72;
                    const armAmp = isRunning ? 0.95 : 0.48;

                    // Legs (opposite phase)
                    if (bones.leftLeg) bones.leftLeg.rotation.x = Math.sin(walkTime) * legAmp;
                    if (bones.rightLeg) bones.rightLeg.rotation.x = Math.sin(walkTime + Math.PI) * legAmp;

                    // Arms (natural opposite + slight z-swing)
                    if (bones.leftArm) {
                        bones.leftArm.rotation.x = Math.sin(walkTime + Math.PI) * armAmp;
                        bones.leftArm.rotation.z = Math.cos(walkTime) * 0.15;
                    }
                    if (bones.rightArm) {
                        bones.rightArm.rotation.x = Math.sin(walkTime) * armAmp;
                        bones.rightArm.rotation.z = Math.cos(walkTime + Math.PI) * 0.15;
                    }

                    // Torso dynamics (this is where it feels ALIVE)
                    if (bones.spine) {
                        bones.spine.rotation.x = -currentSpeed * 1.35;           // forward lean
                        bones.spine.rotation.z = Math.sin(walkTime * 0.85) * 0.14; // side sway
                    }

                    // Hip bob (vertical weight transfer)
                    hero.position.y = Math.abs(Math.sin(walkTime * 2.1)) * 0.11 * Math.min(currentSpeed * 4, 1);
                } else {
                    // === Premium Idle (breathing + weight shift) ===
                    walkTime = 0;
                    const breath = Math.sin(Date.now() * 0.0028) * 0.028;

                    // Gentle arm drop + breathing
                    if (bones.leftArm) bones.leftArm.rotation.x = BABYLON.Scalar.Lerp(bones.leftArm.rotation.x, 0.18, 0.12);
                    if (bones.rightArm) bones.rightArm.rotation.x = BABYLON.Scalar.Lerp(bones.rightArm.rotation.x, 0.18, 0.12);
                    if (bones.spine) bones.spine.rotation.x = breath;

                    // Reset bob
                    hero.position.y = BABYLON.Scalar.Lerp(hero.position.y, 0, 0.15);
                }
            });

            return scene;
        };

        createScene().then(scene => engine.runRenderLoop(() => scene.render()));
        window.addEventListener("resize", () => engine.resize());
    </script>
</body>
</html>
