<!DOCTYPE html>
<html>
<head>
    <title>Helen's Adventure</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #222; }
        canvas { width: 100vw; height: 100vh; touch-action: none; display: block; }
    </style>
</head>
<body>
    <canvas id="renderCanvas"></canvas>

    <script>
        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true);

        const createScene = async function () {
            const scene = new BABYLON.Scene(engine);
            scene.clearColor = new BABYLON.Color3(0.6, 0.8, 1.0); 

            const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);
            light.intensity = 0.9; 

            const ground = BABYLON.MeshBuilder.CreateGround("ground", {width: 50, height: 50}, scene);
            const groundMat = new BABYLON.StandardMaterial("groundMat", scene);
            groundMat.diffuseColor = new BABYLON.Color3(0.3, 0.5, 0.3);
            ground.material = groundMat;

            // 1. Load Helen
            const result = await BABYLON.SceneLoader.ImportMeshAsync(
                "", 
                "https://raw.githubusercontent.com/Andrew0046/Helen-A.I./main/", 
                "Helen1.glb", 
                scene
            );
            
            const hero = result.meshes[0]; 
            
            // 2. Setup Animations
            const animGroups = result.animationGroups;
            let walkAnim = null;
            let idleAnim = null;

            // Look through the file's animations to find "walk" and "idle"
            animGroups.forEach(anim => {
                anim.stop(); // Stop all animations from playing at once
                console.log("Found animation in file: ", anim.name); // Logs the name to your F12 Console
                
                let name = anim.name.toLowerCase();
                if (name.includes("walk") || name.includes("run")) {
                    walkAnim = anim;
                } else if (name.includes("idle")) {
                    idleAnim = anim;
                }
            });

            // Start the idle animation by default if we found one
            if (idleAnim) idleAnim.start(true, 1.0, idleAnim.from, idleAnim.to, false);

            // 3. Camera Setup
            const camera = new BABYLON.ArcRotateCamera("camera", -Math.PI / 2, Math.PI / 3, 5, hero, scene);
            camera.attachControl(canvas, true); 
            camera.lowerRadiusLimit = 2;
            camera.upperBetaLimit = Math.PI / 2.2; 

            // 4. Input Setup (Keyboard & Gamepad)
            const inputMap = {};
            scene.actionManager = new BABYLON.ActionManager(scene);
            
            scene.actionManager.registerAction(new BABYLON.ExecuteCodeAction(BABYLON.ActionManager.OnKeyDownTrigger, function (evt) {
                inputMap[evt.sourceEvent.key.toLowerCase()] = true;
            }));
            scene.actionManager.registerAction(new BABYLON.ExecuteCodeAction(BABYLON.ActionManager.OnKeyUpTrigger, function (evt) {
                inputMap[evt.sourceEvent.key.toLowerCase()] = false;
            }));

            const dsm = new BABYLON.DeviceSourceManager(engine);

            // 5. The Game Loop
            const speed = 0.05; 
            
            scene.onBeforeRenderObservable.add(() => {
                let moveX = 0;
                let moveZ = 0;

                // Check Keyboard
                if (inputMap["w"]) { moveZ -= speed; }
                if (inputMap["s"]) { moveZ += speed; }
                if (inputMap["a"]) { moveX += speed; }
                if (inputMap["d"]) { moveX -= speed; }

                // Check PS5 Controller
                const gamepad = dsm.getDeviceSource(BABYLON.DeviceType.DualShock) || 
                                dsm.getDeviceSource(BABYLON.DeviceType.Xbox) || 
                                dsm.getDeviceSource(BABYLON.DeviceType.Generic);
                
                if (gamepad) {
                    const leftStickX = gamepad.getInput(BABYLON.DeviceInputType.LeftStickX);
                    const leftStickY = gamepad.getInput(BABYLON.DeviceInputType.LeftStickY);
                    
                    if (leftStickX && Math.abs(leftStickX) > 0.1) { moveX -= leftStickX * speed; } 
                    if (leftStickY && Math.abs(leftStickY) > 0.1) { moveZ += leftStickY * speed; }
                }

                // Apply Movement and Animation
                let isMoving = (moveX !== 0 || moveZ !== 0);

                if (isMoving) {
                    // Move and Rotate
                    hero.position.x += moveX;
                    hero.position.z += moveZ;

                    let targetAngle = Math.atan2(moveX, moveZ);
                    hero.rotationQuaternion = null; 
                    hero.rotation.y = targetAngle + Math.PI; 

                    // Play Walk Animation
                    if (walkAnim && !walkAnim.isPlaying) {
                        if (idleAnim) idleAnim.stop();
                        walkAnim.start(true, 1.0, walkAnim.from, walkAnim.to, false);
                    }
                } else {
                    // Play Idle Animation when stopped
                    if (walkAnim && walkAnim.isPlaying) {
                        walkAnim.stop();
                        if (idleAnim && !idleAnim.isPlaying) {
                            idleAnim.start(true, 1.0, idleAnim.from, idleAnim.to, false);
                        }
                    }
                }
            });

            return scene;
        };

        createScene().then(scene => {
            engine.runRenderLoop(function () {
                scene.render();
            });
        });

        window.addEventListener("resize", function () {
            engine.resize();
        });
    </script>
</body>
</html>
