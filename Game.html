<!DOCTYPE html>
<html>
<head>
    <title>Helen's Epic Adventure: Debug Mode</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <script src="https://cdn.babylonjs.com/inspector/babylon.inspector.bundle.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; }
        canvas { width: 100vw; height: 100vh; touch-action: none; display: block; }
        #ui { position: absolute; bottom: 20px; width: 100%; text-align: center; color: #ff0055; font-family: monospace; z-index: 10; pointer-events: none;}
    </style>
</head>
<body>
    <div id="ui">WASD or PS5 Controller | Inspector Loading...</div>
    <canvas id="renderCanvas"></canvas>

    <script>
        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true);

        const createScene = async function () {
            const scene = new BABYLON.Scene(engine);
            scene.clearColor = new BABYLON.Color3(0.02, 0.02, 0.02);

            // Lighting
            const dirLight = new BABYLON.DirectionalLight("dirLight", new BABYLON.Vector3(-1, -2, -1), scene);
            dirLight.intensity = 1.5;
            const rimLight = new BABYLON.SpotLight("rimLight", new BABYLON.Vector3(5, 5, -5), new BABYLON.Vector3(-1, -1, 1), Math.PI / 3, 2, scene);
            rimLight.diffuse = new BABYLON.Color3(1, 0, 0.3); 

            // Ground
            const ground = BABYLON.MeshBuilder.CreateGround("ground", {width: 100, height: 100}, scene);
            const groundMat = new BABYLON.StandardMaterial("groundMat", scene);
            groundMat.diffuseColor = new BABYLON.Color3(0.1, 0.1, 0.1);
            ground.material = groundMat;

            // 1. Load Helen
            const result = await BABYLON.SceneLoader.ImportMeshAsync("", "https://raw.githubusercontent.com/Andrew0046/Helen-A.I./main/", "Helen1.glb", scene);
            const hero = result.meshes[0]; 
            
            // Stop default T-Pose animations
            result.animationGroups.forEach(anim => {
                anim.stop();
            });

            // 2. Map the Bones (We will fix this once we see the Inspector!)
            const bones = { leftArm:null, rightArm:null, leftLeg:null, rightLeg:null, spine:null };
            
            result.transformNodes.forEach(node => {
                let n = node.name.toLowerCase();
                if (n.includes('spine')) bones.spine = node;
                if (n.includes('upperarm') && (n.includes('_l_') || n.includes('left'))) bones.leftArm = node;
                if (n.includes('upperarm') && (n.includes('_r_') || n.includes('right'))) bones.rightArm = node;
                if (n.includes('upperleg') && (n.includes('_l_') || n.includes('left'))) bones.leftLeg = node;
                if (n.includes('upperleg') && (n.includes('_r_') || n.includes('right'))) bones.rightLeg = node;
            });

            console.log("🎮 Successfully Linked Bones: ", bones);

            for (let key in bones) {
                if (bones[key]) {
                    bones[key].rotationQuaternion = null;
                    if (!bones[key].rotation) bones[key].rotation = new BABYLON.Vector3(0, 0, 0);
                }
            }

            // 3. Camera
            const camera = new BABYLON.ArcRotateCamera("camera", -Math.PI / 2, Math.PI / 3, 5, hero, scene);
            camera.attachControl(canvas, true); 
            camera.lowerRadiusLimit = 2;
            camera.upperBetaLimit = Math.PI / 2.1; 
            const baseFov = 0.8; 
            const runFov = 1.1;
            camera.fov = baseFov;

            // 4. Inputs
            const inputMap = {};
            scene.actionManager = new BABYLON.ActionManager(scene);
            scene.actionManager.registerAction(new BABYLON.ExecuteCodeAction(BABYLON.ActionManager.OnKeyDownTrigger, evt => inputMap[evt.sourceEvent.key.toLowerCase()] = true));
            scene.actionManager.registerAction(new BABYLON.ExecuteCodeAction(BABYLON.ActionManager.OnKeyUpTrigger, evt => inputMap[evt.sourceEvent.key.toLowerCase()] = false));

            const gamepadManager = new BABYLON.GamepadManager();
            let myController = null;
            gamepadManager.onGamepadConnectedObservable.add(gamepad => myController = gamepad);
            gamepadManager.onGamepadDisconnectedObservable.add(() => myController = null);

            // 5. Game Loop
            const speed = 0.08; 
            let walkAccumulator = 0; 
            let smoothSpeed = 0;

            scene.onBeforeRenderObservable.add(() => {
                let moveX = 0; let moveZ = 0;
                let isRunning = inputMap["shift"] || (myController && myController.browserGamepad.buttons[10]?.pressed); 

                if (inputMap["w"]) moveZ -= speed;
                if (inputMap["s"]) moveZ += speed;
                if (inputMap["a"]) moveX += speed;
                if (inputMap["d"]) moveX -= speed;

                if (myController && myController.leftStick) {
                    if (Math.abs(myController.leftStick.x) > 0.1) moveX -= myController.leftStick.x * speed; 
                    if (Math.abs(myController.leftStick.y) > 0.1) moveZ -= myController.leftStick.y * speed; 
                }

                if (isRunning) { moveX *= 1.8; moveZ *= 1.8; }

                let currentSpeed = Math.sqrt(moveX*moveX + moveZ*moveZ);
                smoothSpeed = BABYLON.Scalar.Lerp(smoothSpeed, currentSpeed, 0.1);

                if (currentSpeed > 0) {
                    hero.position.x += moveX;
                    hero.position.z += moveZ;
                    
                    let targetAngle = Math.atan2(moveX, moveZ);
                    hero.rotationQuaternion = null; 
                    hero.rotation.y = targetAngle + Math.PI; 
                }

                // Procedural Animation
                const delta = engine.getDeltaTime() / 1000;
                const time = Date.now() * 0.001;
                
                if (smoothSpeed > 0.01) {
                    walkAccumulator += (smoothSpeed * 150) * delta;
                    const wc = walkAccumulator;
                    const legAmp = isRunning ? 0.7 : 0.4;
                    const armAmp = isRunning ? 0.5 : 0.2;

                    if (bones.leftLeg) bones.leftLeg.rotation.x = Math.sin(wc) * legAmp;
                    if (bones.rightLeg) bones.rightLeg.rotation.x = Math.sin(wc + Math.PI) * legAmp;
                    if (bones.leftArm) bones.leftArm.rotation.x = Math.sin(wc + Math.PI) * armAmp;
                    if (bones.rightArm) bones.rightArm.rotation.x = Math.sin(wc) * armAmp;
                    if (bones.spine) bones.spine.rotation.y = Math.cos(wc) * 0.1;
                } else {
                    walkAccumulator = 0;
                    const breath = Math.sin(time * 2.5) * 0.03;
                    if (bones.leftLeg) bones.leftLeg.rotation.x = BABYLON.Scalar.Lerp(bones.leftLeg.rotation.x, 0, 0.1);
                    if (bones.rightLeg) bones.rightLeg.rotation.x = BABYLON.Scalar.Lerp(bones.rightLeg.rotation.x, 0, 0.1);
                    if (bones.leftArm) bones.leftArm.rotation.x = BABYLON.Scalar.Lerp(bones.leftArm.rotation.x, 0.1, 0.1);
                    if (bones.rightArm) bones.rightArm.rotation.x = BABYLON.Scalar.Lerp(bones.rightArm.rotation.x, 0.1, 0.1);
                    if (bones.spine) bones.spine.rotation.x = breath;
                }

                const targetFov = isRunning && smoothSpeed > 0.05 ? runFov : baseFov;
                camera.fov = BABYLON.Scalar.Lerp(camera.fov, targetFov, 0.05);
            });

            // --- OPEN THE INSPECTOR ---
            await scene.debugLayer.show();

            return scene;
        };

        createScene().then(scene => { engine.runRenderLoop(() => scene.render()); });
        window.addEventListener("resize", () => engine.resize());
    </script>
</body>
</html>
