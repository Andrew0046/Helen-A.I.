<!DOCTYPE html>
<html>
<head>
    <title>Helen's Epic Adventure: Mobile Edition</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; touch-action: none; }
        canvas { width: 100vw; height: 100vh; display: block; outline: none; }
        #ui { position: absolute; top: 20px; width: 100%; text-align: center; color: #ff0055; font-family: monospace; font-size: 1.2rem; pointer-events: none; text-shadow: 0 0 10px rgba(255,0,85,0.8);}
    </style>
</head>
<body>
    <div id="ui">Left Thumb: Move | Right Thumb: Camera</div>
    <canvas id="renderCanvas"></canvas>

    <script>
        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true);

        const createScene = async function () {
            const scene = new BABYLON.Scene(engine);
            scene.clearColor = new BABYLON.Color3(0.05, 0.07, 0.1); // Dark atmospheric fantasy night
            scene.fogMode = BABYLON.Scene.FOGMODE_EXP2;
            scene.fogDensity = 0.015;
            scene.fogColor = scene.clearColor;

            // --- 1. POST-PROCESSING (The "Anime Glow" from the one.txt) ---
            const pipeline = new BABYLON.DefaultRenderingPipeline("default", true, scene, [scene.activeCamera]);
            pipeline.bloomEnabled = true;
            pipeline.bloomThreshold = 0.8;
            pipeline.bloomWeight = 0.3;

            // --- 2. LIGHTING ---
            const mainLight = new BABYLON.DirectionalLight("mainLight", new BABYLON.Vector3(1, -2, 1), scene);
            mainLight.intensity = 1.5;
            const rimLight = new BABYLON.SpotLight("rimLight", new BABYLON.Vector3(-2, 2, -2), new BABYLON.Vector3(1, -1, 1), Math.PI / 2, 2, scene);
            rimLight.diffuse = new BABYLON.Color3(1, 0.2, 0.5); // Pinkish rim light
            rimLight.intensity = 2.0;

            const ground = BABYLON.MeshBuilder.CreateGround("ground", {width: 100, height: 100}, scene);
            const groundMat = new BABYLON.StandardMaterial("groundMat", scene);
            groundMat.diffuseColor = new BABYLON.Color3(0.1, 0.15, 0.1);
            groundMat.specularColor = new BABYLON.Color3(0, 0, 0); // Remove plastic shine
            ground.material = groundMat;

            // --- 3. LOAD HELEN & STOP T-POSE ---
            const result = await BABYLON.SceneLoader.ImportMeshAsync("", "https://raw.githubusercontent.com/Andrew0046/Helen-A.I./main/", "Helen1.glb", scene);
            const hero = result.meshes[0]; 
            result.animationGroups.forEach(anim => anim.stop());

            // --- 4. MAP EXACT VROID BONES ---
            const bones = { 
                leftArm: scene.getTransformNodeByName("J_Bip_L_UpperArm"), 
                rightArm: scene.getTransformNodeByName("J_Bip_R_UpperArm"), 
                leftLeg: scene.getTransformNodeByName("J_Bip_L_UpperLeg"), 
                rightLeg: scene.getTransformNodeByName("J_Bip_R_UpperLeg"), 
                spine: scene.getTransformNodeByName("J_Bip_C_Spine") 
            };

            for (let key in bones) {
                if (bones[key]) {
                    bones[key].rotationQuaternion = null;
                    if (!bones[key].rotation) bones[key].rotation = new BABYLON.Vector3(0,0,0);
                }
            }

            // --- 5. SETUP HAIR PHYSICS & BLINKING ---
            let hairBones = [];
            result.transformNodes.forEach(node => {
                if (node.name.includes('J_Sec_Hair')) {
                    node.rotationQuaternion = null;
                    if (!node.rotation) node.rotation = new BABYLON.Vector3(0,0,0);
                    hairBones.push({ bone: node, baseRot: node.rotation.clone() });
                }
            });

            let blinkTarget = null;
            result.meshes.forEach(m => {
                if (m.morphTargetManager) {
                    for (let i = 0; i < m.morphTargetManager.numTargets; i++) {
                        let target = m.morphTargetManager.getTarget(i);
                        if (target.name === "Fcl_EYE_Close") blinkTarget = target;
                    }
                }
            });

            let blinkState = { isBlinking: false, value: 0, nextTime: Date.now() + 3000 };

            // --- 6. CAMERA & VIRTUAL JOYSTICK ---
            const camera = new BABYLON.ArcRotateCamera("camera", -Math.PI / 2, Math.PI / 3, 4, hero, scene);
            camera.attachControl(canvas, true); 
            camera.lowerRadiusLimit = 1.5;
            camera.upperBetaLimit = Math.PI / 2.1; 
            pipeline.cameras = [camera]; // Attach bloom to camera

            const leftJoystick = new BABYLON.VirtualJoystick(true);
            BABYLON.VirtualJoystick.Canvas.style.zIndex = "4";

            // --- 7. HYBRID GAME LOOP ---
            const speed = 0.08; 
            let walkAccumulator = 0; 
            let smoothSpeed = 0;

            scene.onBeforeRenderObservable.add(() => {
                let moveX = 0; let moveZ = 0;
                const time = Date.now() * 0.001;
                const delta = engine.getDeltaTime() / 1000;

                // Joystick Input
                if (leftJoystick.pressed) {
                    moveX = leftJoystick.deltaPosition.x * speed;
                    moveZ = leftJoystick.deltaPosition.y * speed; 
                }

                let currentSpeed = Math.sqrt(moveX*moveX + moveZ*moveZ);
                smoothSpeed = BABYLON.Scalar.Lerp(smoothSpeed, currentSpeed, 0.15);

                // Movement & Rotation
                if (currentSpeed > 0) {
                    hero.position.x += moveX;
                    hero.position.z += moveZ;
                    hero.rotation.y = Math.atan2(moveX, moveZ) + Math.PI; 
                }

                // Procedural Animation (Limbs & Breathing)
                if (smoothSpeed > 0.01) {
                    walkAccumulator += (smoothSpeed * 150) * delta;
                    const wc = walkAccumulator;
                    if (bones.leftLeg) bones.leftLeg.rotation.x = Math.sin(wc) * 0.5;
                    if (bones.rightLeg) bones.rightLeg.rotation.x = Math.sin(wc + Math.PI) * 0.5;
                    if (bones.leftArm) bones.leftArm.rotation.x = Math.sin(wc + Math.PI) * 0.3;
                    if (bones.rightArm) bones.rightArm.rotation.x = Math.sin(wc) * 0.3;
                    if (bones.spine) bones.spine.rotation.y = Math.cos(wc) * 0.1;
                } else {
                    walkAccumulator = 0;
                    const breath = Math.sin(time * 2.5) * 0.03;
                    if (bones.leftLeg) bones.leftLeg.rotation.x = BABYLON.Scalar.Lerp(bones.leftLeg.rotation.x, 0, 0.1);
                    if (bones.rightLeg) bones.rightLeg.rotation.x = BABYLON.Scalar.Lerp(bones.rightLeg.rotation.x, 0, 0.1);
                    if (bones.leftArm) bones.leftArm.rotation.x = BABYLON.Scalar.Lerp(bones.leftArm.rotation.x, 0.1, 0.1);
                    if (bones.rightArm) bones.rightArm.rotation.x = BABYLON.Scalar.Lerp(bones.rightArm.rotation.x, 0.1, 0.1);
                    if (bones.spine) bones.spine.rotation.x = breath;
                }

                // Hair Physics (Wind + Movement Drag)
                const wind = Math.sin(time * 2) * 0.03;
                hairBones.forEach(h => {
                    // Hair leans back based on speed, plus a little wind
                    let targetRotX = h.baseRot.x + wind + (smoothSpeed * 2.5);
                    h.bone.rotation.x = BABYLON.Scalar.Lerp(h.bone.rotation.x, targetRotX, 0.1);
                });

                // Blinking Logic
                if (blinkTarget) {
                    if (blinkState.isBlinking) {
                        blinkState.value += 0.25;
                        if (blinkState.value >= 1.2) { blinkState.value = 1; blinkState.isBlinking = false; }
                    } else {
                        blinkState.value -= 0.1;
                        if (blinkState.value <= 0) {
                            blinkState.value = 0;
                            if (Date.now() >= blinkState.nextTime) {
                                blinkState.isBlinking = true;
                                blinkState.nextTime = Date.now() + 3500 + (Math.random() * 2000);
                            }
                        }
                    }
                    blinkTarget.influence = Math.max(0, Math.min(1, blinkState.value));
                }
            });

            return scene;
        };

        createScene().then(scene => { engine.runRenderLoop(() => scene.render()); });
        window.addEventListener("resize", () => engine.resize());
    </script>
</body>
</html>
