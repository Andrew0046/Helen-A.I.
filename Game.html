<!DOCTYPE html>
<html>
<head>
    <title>Helen's Epic Adventure: Hybrid Engine v2.1</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; }
        canvas { width: 100vw; height: 100vh; display: block; }
        #ui {
            position: absolute; bottom: 20px; width: 100%; text-align: center;
            color: #ff0055; font-family: monospace; text-shadow: 0 0 15px #ff0055;
            pointer-events: none; font-size: 1.1em;
        }
    </style>
</head>
<body>
    <div id="ui">WASD or PS5 Controller to Move | Shift / L3 to Run | Hybrid Procedural Animation v2.1</div>
    <canvas id="renderCanvas"></canvas>

    <script>
        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true);

        const createScene = async function () {
            const scene = new BABYLON.Scene(engine);
            scene.clearColor = new BABYLON.Color3(0.015, 0.015, 0.025);
            scene.fogMode = BABYLON.Scene.FOGMODE_EXP2;
            scene.fogDensity = 0.018;
            scene.fogColor = new BABYLON.Color3(0.015, 0.015, 0.025);

            // Dramatic lighting (same as before, just polished)
            const dirLight = new BABYLON.DirectionalLight("dirLight", new BABYLON.Vector3(-1, -2, -1), scene);
            dirLight.intensity = 1.7;
            const rimLight = new BABYLON.SpotLight("rimLight", new BABYLON.Vector3(5, 5, -5), new BABYLON.Vector3(-1, -1, 1), Math.PI / 3, 2, scene);
            rimLight.diffuse = new BABYLON.Color3(1, 0, 0.3);

            // Bigger ground with subtle specular
            const ground = BABYLON.MeshBuilder.CreateGround("ground", {width: 200, height: 200}, scene);
            const groundMat = new BABYLON.StandardMaterial("groundMat", scene);
            groundMat.diffuseColor = new BABYLON.Color3(0.07, 0.08, 0.07);
            groundMat.specularColor = new BABYLON.Color3(0.15, 0.15, 0.15);
            ground.material = groundMat;

            // === 1. Load Helen ===
            const result = await BABYLON.SceneLoader.ImportMeshAsync("", "https://raw.githubusercontent.com/Andrew0046/Helen-A.I./main/", "Helen1.glb", scene);
            const hero = result.meshes[0];

            // === 2. ROBUST BONE MAPPING (kept from v2 - much more reliable) ===
            const bones = {};
            const boneMap = {
                leftLeg: ["leftupleg", "leftleg", "leg_l", "upleg_l", "left_upper_leg"],
                rightLeg: ["rightupleg", "rightleg", "leg_r", "upleg_r", "right_upper_leg"],
                leftArm: ["leftupperarm", "leftarm", "arm_l", "upperarm_l", "left_upper_arm"],
                rightArm: ["rightupperarm", "rightarm", "arm_r", "upperarm_r", "right_upper_arm"],
                spine: ["spine", "spine1", "spine2", "hips"]
            };

            result.transformNodes.forEach(node => {
                const n = node.name.toLowerCase();
                for (let key in boneMap) {
                    if (boneMap[key].some(term => n.includes(term))) bones[key] = node;
                }
            });

            console.log("✅ Bones mapped:", Object.keys(bones));

            // Clear quaternion lock once (critical)
            Object.values(bones).forEach(b => b && (b.rotationQuaternion = null));

            // === 3. Shadows (new polish - looks way better) ===
            const shadowGenerator = new BABYLON.ShadowGenerator(2048, dirLight);
            shadowGenerator.useBlurExponentialShadowMap = true;
            shadowGenerator.blurKernel = 32;
            result.meshes.forEach(m => {
                if (m !== ground) shadowGenerator.addShadowCaster(m);
            });
            ground.receiveShadows = true;

            // === 4. Camera (back to your original ArcRotate style) ===
            const camera = new BABYLON.ArcRotateCamera("camera", -Math.PI / 2, Math.PI / 3, 13, hero, scene);
            camera.attachControl(canvas, true);
            camera.lowerRadiusLimit = 6;
            camera.upperBetaLimit = Math.PI / 2.1;
            const baseFov = 0.8;
            const runFov = 1.1;
            camera.fov = baseFov;

            // === 5. Inputs (same as original) ===
            const inputMap = {};
            scene.actionManager = new BABYLON.ActionManager(scene);
            scene.actionManager.registerAction(new BABYLON.ExecuteCodeAction(BABYLON.ActionManager.OnKeyDownTrigger, evt => inputMap[evt.sourceEvent.key.toLowerCase()] = true));
            scene.actionManager.registerAction(new BABYLON.ExecuteCodeAction(BABYLON.ActionManager.OnKeyUpTrigger, evt => inputMap[evt.sourceEvent.key.toLowerCase()] = false));

            const gamepadManager = new BABYLON.GamepadManager();
            let myController = null;
            gamepadManager.onGamepadConnectedObservable.add(gamepad => myController = gamepad);
            gamepadManager.onGamepadDisconnectedObservable.add(() => myController = null);

            // === 6. THE HYBRID GAME LOOP - MOVEMENT RESTORED TO ORIGINAL STYLE ===
            const speed = 0.08;
            let walkAccumulator = 0;
            let smoothSpeed = 0;

            scene.onBeforeRenderObservable.add(() => {
                let moveX = 0; let moveZ = 0;
                let isRunning = inputMap["shift"] || (myController && myController.browserGamepad.buttons[10]?.pressed);

                // Keyboard
                if (inputMap["w"]) moveZ -= speed;
                if (inputMap["s"]) moveZ += speed;
                if (inputMap["a"]) moveX += speed;
                if (inputMap["d"]) moveX -= speed;

                // Gamepad
                if (myController && myController.leftStick) {
                    if (Math.abs(myController.leftStick.x) > 0.1) moveX -= myController.leftStick.x * speed;
                    if (Math.abs(myController.leftStick.y) > 0.1) moveZ -= myController.leftStick.y * speed;
                }

                // Sprint
                if (isRunning) { moveX *= 1.8; moveZ *= 1.8; }

                // === ORIGINAL MOVEMENT STYLE (exactly as you asked) ===
                let currentSpeed = Math.sqrt(moveX * moveX + moveZ * moveZ);
                smoothSpeed = BABYLON.Scalar.Lerp(smoothSpeed, currentSpeed, 0.1);

                if (currentSpeed > 0) {
                    hero.position.x += moveX;
                    hero.position.z += moveZ;
                    
                    let targetAngle = Math.atan2(moveX, moveZ);
                    hero.rotationQuaternion = null;
                    hero.rotation.y = targetAngle + Math.PI;
                }

                const delta = engine.getDeltaTime() / 1000;

                // === UPGRADED PROCEDURAL ANIMATION (this is what makes it feel premium) ===
                if (smoothSpeed > 0.01) {
                    walkAccumulator += (smoothSpeed * 150) * delta;
                    const wc = walkAccumulator;
                    const legAmp = isRunning ? 0.85 : 0.55;
                    const armAmp = isRunning ? 0.75 : 0.38;

                    // Legs
                    if (bones.leftLeg) bones.leftLeg.rotation.x = Math.sin(wc) * legAmp;
                    if (bones.rightLeg) bones.rightLeg.rotation.x = Math.sin(wc + Math.PI) * legAmp;

                    // Arms + natural side swing
                    if (bones.leftArm) {
                        bones.leftArm.rotation.x = Math.sin(wc + Math.PI) * armAmp;
                        bones.leftArm.rotation.z = Math.cos(wc) * 0.18;
                    }
                    if (bones.rightArm) {
                        bones.rightArm.rotation.x = Math.sin(wc) * armAmp;
                        bones.rightArm.rotation.z = Math.cos(wc + Math.PI) * -0.18;
                    }

                    // Torso dynamics (lean + sway)
                    if (bones.spine) {
                        bones.spine.rotation.x = -currentSpeed * 1.1;           // forward lean when moving
                        bones.spine.rotation.z = Math.sin(wc * 0.85) * 0.13;   // side sway
                    }

                    // Hip bob (feels heavy and alive)
                    hero.position.y = Math.abs(Math.sin(wc * 2.2)) * 0.09 * Math.min(currentSpeed * 4, 1);
                } else {
                    // Premium idle breathing
                    walkAccumulator = 0;
                    const breath = Math.sin(Date.now() * 0.0025) * 0.032;

                    if (bones.leftLeg) bones.leftLeg.rotation.x = BABYLON.Scalar.Lerp(bones.leftLeg.rotation.x, 0, 0.15);
                    if (bones.rightLeg) bones.rightLeg.rotation.x = BABYLON.Scalar.Lerp(bones.rightLeg.rotation.x, 0, 0.15);
                    if (bones.leftArm) bones.leftArm.rotation.x = BABYLON.Scalar.Lerp(bones.leftArm.rotation.x, 0.18, 0.12);
                    if (bones.rightArm) bones.rightArm.rotation.x = BABYLON.Scalar.Lerp(bones.rightArm.rotation.x, 0.18, 0.12);
                    if (bones.spine) bones.spine.rotation.x = breath;

                    hero.position.y = BABYLON.Scalar.Lerp(hero.position.y, 0, 0.18);
                }

                // Dynamic FOV
                const targetFov = isRunning && smoothSpeed > 0.05 ? runFov : baseFov;
                camera.fov = BABYLON.Scalar.Lerp(camera.fov, targetFov, 0.05);
            });

            return scene;
        };

        createScene().then(scene => { engine.runRenderLoop(() => scene.render()); });
        window.addEventListener("resize", () => engine.resize());
    </script>
</body>
</html>
