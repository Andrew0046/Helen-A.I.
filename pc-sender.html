<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC Uplink: The Control Deck v4.4</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/idb-keyval@6/dist/umd.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', Roboto, sans-serif; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; }
        
        .uplink-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); padding: 40px; border-radius: 16px; width: 450px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: absolute; z-index: 10; transition: opacity 0.5s; }
        h1 { font-weight: 200; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 5px; color: #00d2ff; }
        p { color: #888; font-size: 0.9rem; margin-bottom: 25px; }
        
        .vault-section { background: rgba(0,0,0,0.3); padding: 20px; border-radius: 12px; margin-bottom: 25px; border: 1px dashed #444; }
        
        input[type="text"] { background: rgba(0,0,0,0.4); border: 1px solid #333; padding: 15px; color: #00ff00; border-radius: 8px; font-size: 24px; text-align: center; width: 70%; letter-spacing: 5px; margin-bottom: 20px; font-weight: bold; }
        
        .btn-main { background: linear-gradient(135deg, #00d2ff 0%, #0078ff 100%); border: none; padding: 15px 30px; color: white; font-weight: bold; font-size: 14px; letter-spacing: 1px; border-radius: 30px; cursor: pointer; width: 100%; transition: transform 0.2s; margin-bottom: 10px; text-transform: uppercase; }
        .btn-alt { background: transparent; border: 1px solid #ff9d00; color: #ff9d00; }
        
        #status { margin-top: 15px; font-size: 0.85rem; color: #ff9d00; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        
        #preview-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; opacity: 0.15; display: none; }
        video { width: 100%; height: 100%; object-fit: contain; }
        
        /* MULTIMEDIA PLAYERS */
        #cinema-player { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 2; display: none; background: black; }
        #photo-canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 2; display: none; background: black; object-fit: contain; }

        #dashboard { position: absolute; z-index: 5; display: none; flex-direction: column; align-items: center; width: 90%; max-height: 80vh; overflow-y: auto; padding-top: 50px; }
        #library-grid { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; width: 100%; margin-top: 20px; }
        
        .hitbox { width: 280px; height: 120px; background: rgba(0, 210, 255, 0.1); border: 2px solid #00d2ff; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; text-align: center; padding: 15px; cursor: pointer; transition: background 0.3s; box-sizing: border-box; color: #fff; word-break: break-word; }
        .movie-box { border-color: #ff9d00; color: #ff9d00; background: rgba(255, 157, 0, 0.1); }
        .photo-box { border-color: #d200ff; color: #d200ff; background: rgba(210, 0, 255, 0.1); }
        
        #escape-hatch { position: absolute; top: 0; left: 0; width: 100vw; height: 120px; background: linear-gradient(to bottom, rgba(255,0,0,0.3) 0%, transparent 100%); z-index: 9998; display: none; align-items: flex-start; justify-content: center; padding-top: 20px; color: #ff4444; font-size: 1.5rem; font-weight: bold; letter-spacing: 4px; text-transform: uppercase; border: none; }

        /* SLIDESHOW HITBOXES */
        .nav-hatch { position: absolute; top: 120px; height: calc(100vh - 120px); width: 250px; z-index: 9997; display: none; align-items: center; justify-content: center; font-size: 2rem; font-weight: bold; color: #d200ff; opacity: 0.3; transition: opacity 0.3s; cursor: pointer; border: none; border-radius: 0; }
        #nav-left { left: 0; background: linear-gradient(to right, rgba(210,0,255,0.2) 0%, transparent 100%); border-right: 2px dashed #d200ff; }
        #nav-right { right: 0; background: linear-gradient(to left, rgba(210,0,255,0.2) 0%, transparent 100%); border-left: 2px dashed #d200ff; }

        /* --- THE HOLOGRAPHIC CONTROL DECK --- */
        #control-deck { position: absolute; bottom: -250px; left: 0; width: 100vw; height: 200px; background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.6) 60%, transparent 100%); z-index: 9998; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 30px; transition: bottom 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .deck-row { display: flex; gap: 20px; margin-bottom: 20px; align-items: center; }
        .deck-btn { width: 120px; height: 60px; font-size: 1.2rem; border-color: #00ff00; color: #00ff00; background: rgba(0,255,0,0.1); }
        .deck-btn-main { width: 160px; height: 70px; font-size: 1.5rem; border-color: #00d2ff; color: #00d2ff; background: rgba(0,210,255,0.1); }
        
        #scrub-hitbox { width: 60%; height: 60px; display: flex; align-items: center; position: relative; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; background: rgba(0,0,0,0.5); }
        #scrub-track { width: 96%; height: 8px; background: rgba(255,255,255,0.2); border-radius: 4px; position: absolute; left: 2%; }
        #scrub-fill { width: 0%; height: 100%; background: #00d2ff; border-radius: 4px; box-shadow: 0 0 10px #00d2ff; pointer-events: none; }
        #time-display { position: absolute; right: 20px; color: #aaa; font-family: monospace; font-size: 1.2rem; pointer-events: none; }

        /* THE LASER POINTER */
        #laser-pointer { position: absolute; width: 12px; height: 12px; background: #ff0000; border-radius: 50%; box-shadow: 0 0 15px #ff0000; z-index: 9999; display: none; pointer-events: none; transform: translate(-50%, -50%); }
        #dwell-ring { position: absolute; top: -14px; left: -14px; width: 40px; height: 40px; border: 4px solid rgba(255,0,0,0.5); border-radius: 50%; box-sizing: border-box; transform: scale(0); transform-origin: center; transition: transform 0.05s linear; pointer-events: none; }
    </style>
</head>
<body>

    <div id="laser-pointer"><div id="dwell-ring"></div></div>
    
    <div class="hitbox" id="escape-hatch">HOLD GAZE TO CLOSE</div>
    
    <div class="hitbox nav-hatch" id="nav-left">&lt; PREV</div>
    <div class="hitbox nav-hatch" id="nav-right">NEXT &gt;</div>

    <div id="control-deck">
        <div class="deck-row">
            <div class="hitbox deck-btn" id="btn-seek-back">-15s</div>
            <div class="hitbox deck-btn-main" id="btn-play-pause">PAUSE</div>
            <div class="hitbox deck-btn" id="btn-seek-fwd">+15s</div>
        </div>
        <div class="hitbox" id="scrub-hitbox">
            <div id="scrub-track"><div id="scrub-fill"></div></div>
            <div id="time-display">00:00</div>
        </div>
    </div>

    <div id="preview-container"><video id="local-video" autoplay playsinline muted></video></div>
    
    <video id="cinema-player" controls></video>
    <canvas id="photo-canvas" width="1920" height="1080"></canvas>

    <div id="dashboard">
        <h2 style="color: #666; font-weight: 300; letter-spacing: 8px; margin: 0;">THE GRAND LIBRARY</h2>
        <div id="library-grid">
            <div class="hitbox" id="btn-desktop">RESYNC DESKTOP</div>
        </div>
    </div>

    <div class="uplink-card" id="ui-card">
        <h1>PC Uplink v4.4</h1>
        <p>The Control Deck</p>
        
        <div class="vault-section">
            <div id="vault-status" style="color:#aaa; margin-bottom: 10px; font-size: 0.9rem;">Vault Locked</div>
            <button class="btn-main btn-alt" id="btn-vault">1. UNLOCK FOLDER</button>
            <button class="btn-main btn-alt" id="btn-relink" style="display:none; border-color:#00d2ff; color:#00d2ff;">1. SCAN SAVED FOLDER</button>
        </div>
        
        <input type="text" id="pin-input" placeholder="PIN" maxlength="4" autocomplete="off">
        <button class="btn-main" id="btn-connect">2. INITIATE UPLINK</button>
        <div id="status">Awaiting Setup...</div>
    </div>

    <script>
        const peer = new Peer(null, { debug: 2 });
        const dom = {
            pin: document.getElementById('pin-input'), btnConnect: document.getElementById('btn-connect'), status: document.getElementById('status'),
            video: document.getElementById('local-video'), cinema: document.getElementById('cinema-player'), photoCanvas: document.getElementById('photo-canvas'),
            preview: document.getElementById('preview-container'), card: document.getElementById('ui-card'), laser: document.getElementById('laser-pointer'), 
            ring: document.getElementById('dwell-ring'), dashboard: document.getElementById('dashboard'), grid: document.getElementById('library-grid'), 
            escapeHatch: document.getElementById('escape-hatch'), btnVault: document.getElementById('btn-vault'), btnRelink: document.getElementById('btn-relink'), 
            vaultStatus: document.getElementById('vault-status'), navLeft: document.getElementById('nav-left'), navRight: document.getElementById('nav-right'),
            controlDeck: document.getElementById('control-deck'), btnPlay: document.getElementById('btn-play-pause'), btnSeekBack: document.getElementById('btn-seek-back'), 
            btnSeekFwd: document.getElementById('btn-seek-fwd'), scrubHitbox: document.getElementById('scrub-hitbox'), scrubFill: document.getElementById('scrub-fill'), timeDisplay: document.getElementById('time-display')
        };

        let localStream = null; let mediaConn = null; let dataConn = null; let directoryHandle = null;
        let photoPlaylist = []; let currentPhotoIndex = 0; let galleryStreamActive = false;
        
        // Global tracker for laser X coordinate to calculate timeline scrubbing
        let currentLaserX = 0;

        async function checkSavedVault() {
            try {
                const savedHandle = await idbKeyval.get('vault-dir');
                if (savedHandle) {
                    directoryHandle = savedHandle; dom.btnVault.style.display = 'none'; dom.btnRelink.style.display = 'block';
                    dom.vaultStatus.innerText = `Saved Vault Detected. Ready to Scan.`; dom.vaultStatus.style.color = '#00d2ff';
                }
            } catch (err) {}
        }
        checkSavedVault();

        dom.btnVault.addEventListener('click', async () => {
            try { directoryHandle = await window.showDirectoryPicker(); await idbKeyval.set('vault-dir', directoryHandle); scanVault(directoryHandle); } catch (err) {}
        });

        dom.btnRelink.addEventListener('click', async () => {
            try {
                const permission = await directoryHandle.queryPermission({ mode: 'read' });
                if (permission !== 'granted') {
                    const newPermission = await directoryHandle.requestPermission({ mode: 'read' });
                    if (newPermission !== 'granted') return;
                }
                scanVault(directoryHandle);
            } catch (err) {}
        });

        async function scanVault(dirHandle) {
            dom.status.innerText = "SCANNING VAULT...";
            Array.from(dom.grid.children).forEach(child => { if(child.id !== 'btn-desktop') child.remove(); });
            photoPlaylist = []; 
            
            let count = 0;
            for await (const entry of dirHandle.values()) {
                if (entry.kind === 'file') {
                    const isVideo = entry.name.match(/\.(mp4|mkv|webm)$/i);
                    const isPhoto = entry.name.match(/\.(jpg|jpeg|png|webp)$/i);
                    
                    if (isVideo || isPhoto) {
                        count++;
                        const box = document.createElement('div');
                        box.className = isVideo ? 'hitbox movie-box' : 'hitbox photo-box';
                        box.innerText = entry.name.length > 25 ? entry.name.substring(0, 22) + '...' : entry.name;
                        
                        if (isPhoto) {
                            photoPlaylist.push(entry); const assignedIndex = photoPlaylist.length - 1;
                            box.addEventListener('click', () => { currentPhotoIndex = assignedIndex; viewPhoto(currentPhotoIndex); });
                        } else if (isVideo) {
                            box.addEventListener('click', async () => { const file = await entry.getFile(); playMovie(file); });
                        }
                        dom.grid.appendChild(box);
                    }
                }
            }
            dom.vaultStatus.innerText = `Vault Unlocked: ${count} Files`; dom.vaultStatus.style.color = '#00ff00';
            dom.btnVault.style.display = 'none'; dom.btnRelink.style.display = 'none'; dom.status.innerText = "READY FOR UPLINK.";
        }

        function swapToStream(newStream) {
            if (!mediaConn || !mediaConn.peerConnection) return;
            const senders = mediaConn.peerConnection.getSenders();
            const videoTrack = newStream.getVideoTracks()[0];
            if (videoTrack) {
                const vSender = senders.find(s => s.track && s.track.kind === 'video');
                if (vSender) vSender.replaceTrack(videoTrack);
            }
        }

        function playMovie(file) {
            const fileURL = URL.createObjectURL(file);
            dom.cinema.src = fileURL; dom.cinema.style.display = 'block';
            
            dom.cinema.play().then(() => {
                const stream = dom.cinema.captureStream ? dom.cinema.captureStream() : dom.cinema.mozCaptureStream();
                swapToStream(stream); 
                dom.dashboard.style.display = 'none'; dom.escapeHatch.style.display = 'flex'; 
                dom.btnPlay.innerText = "PAUSE";
            });
        }

        // --- NEW: Control Deck Logic ---
        dom.cinema.addEventListener('timeupdate', () => {
            if (dom.cinema.duration) {
                const pct = (dom.cinema.currentTime / dom.cinema.duration) * 100;
                dom.scrubFill.style.width = pct + '%';
                
                const m = Math.floor(dom.cinema.currentTime / 60);
                const s = Math.floor(dom.cinema.currentTime % 60);
                dom.timeDisplay.innerText = `${m}:${s < 10 ? '0'+s : s}`;
            }
        });

        dom.btnPlay.addEventListener('click', () => {
            if (dom.cinema.paused) { dom.cinema.play(); dom.btnPlay.innerText = "PAUSE"; } 
            else { dom.cinema.pause(); dom.btnPlay.innerText = "PLAY"; }
            flashHitbox(dom.btnPlay);
        });

        dom.btnSeekBack.addEventListener('click', () => { dom.cinema.currentTime = Math.max(0, dom.cinema.currentTime - 15); flashHitbox(dom.btnSeekBack); });
        dom.btnSeekFwd.addEventListener('click', () => { dom.cinema.currentTime = Math.min(dom.cinema.duration, dom.cinema.currentTime + 15); flashHitbox(dom.btnSeekFwd); });

        // The Spatial Scrubber Math
        dom.scrubHitbox.addEventListener('click', () => {
            const rect = dom.scrubHitbox.getBoundingClientRect();
            const clickX = currentLaserX - rect.left;
            const percent = Math.max(0, Math.min(1, clickX / rect.width));
            if (dom.cinema.duration) { dom.cinema.currentTime = dom.cinema.duration * percent; }
            flashHitbox(dom.scrubHitbox);
        });

        // Slideshow Logic (Preserved)
        async function viewPhoto(index) {
            const file = await photoPlaylist[index].getFile(); const fileURL = URL.createObjectURL(file);
            const ctx = dom.photoCanvas.getContext('2d'); const img = new Image();
            img.onload = () => {
                ctx.fillStyle = 'black'; ctx.fillRect(0, 0, dom.photoCanvas.width, dom.photoCanvas.height);
                const ratio = Math.min(dom.photoCanvas.width / img.width, dom.photoCanvas.height / img.height);
                ctx.drawImage(img, 0, 0, img.width, img.height, (dom.photoCanvas.width - img.width * ratio) / 2, (dom.photoCanvas.height - img.height * ratio) / 2, img.width * ratio, img.height * ratio);  
                dom.photoCanvas.style.display = 'block';
                if (!galleryStreamActive) { swapToStream(dom.photoCanvas.captureStream(30)); galleryStreamActive = true; }
                dom.dashboard.style.display = 'none'; dom.escapeHatch.style.display = 'flex'; 
                if (photoPlaylist.length > 1) { dom.navLeft.style.display = 'flex'; dom.navRight.style.display = 'flex'; }
            }; img.src = fileURL;
        }

        dom.navLeft.addEventListener('click', () => { currentPhotoIndex = (currentPhotoIndex - 1 + photoPlaylist.length) % photoPlaylist.length; viewPhoto(currentPhotoIndex); flashHitbox(dom.navLeft); });
        dom.navRight.addEventListener('click', () => { currentPhotoIndex = (currentPhotoIndex + 1) % photoPlaylist.length; viewPhoto(currentPhotoIndex); flashHitbox(dom.navRight); });

        function flashHitbox(el) {
            const oldBg = el.style.background;
            el.style.background = 'rgba(255, 255, 255, 0.4)';
            setTimeout(() => el.style.background = oldBg, 300);
        }

        dom.escapeHatch.addEventListener('click', () => {
            dom.cinema.pause(); dom.cinema.style.display = 'none'; dom.photoCanvas.style.display = 'none'; 
            dom.navLeft.style.display = 'none'; dom.navRight.style.display = 'none'; galleryStreamActive = false;
            dom.controlDeck.style.bottom = '-250px'; // Hide deck
            swapToStream(localStream); dom.escapeHatch.style.display = 'none'; dom.dashboard.style.display = 'flex';
        });

        document.getElementById('btn-desktop').addEventListener('click', () => { swapToStream(localStream); });

        dom.btnConnect.addEventListener('click', async () => {
            const pin = dom.pin.value.trim(); if (pin.length !== 4) return; const hubId = 'juncos-hub-' + pin;
            try {
                localStream = await navigator.mediaDevices.getDisplayMedia({ video: { cursor: "always", frameRate: 60 }, audio: true });
                dom.video.srcObject = localStream; dom.preview.style.display = 'block';
                mediaConn = peer.call(hubId, localStream, { metadata: { device: 'pc' } });
                dataConn = peer.connect(hubId);

                dataConn.on('open', () => {
                    dom.card.style.opacity = '0'; setTimeout(() => dom.card.style.display = 'none', 500);
                    dom.dashboard.style.display = 'flex'; dom.laser.style.display = 'block';
                });

                let hoverTarget = null; let hoverStartTime = null; let isClicked = false;
                const DWELL_DURATION = 1500; const SENSITIVITY = 30;

                dataConn.on('data', (data) => {
                    if (data && typeof data.y === 'number' && typeof data.p === 'number') {
                        const centerX = window.innerWidth / 2; const centerY = window.innerHeight / 2;
                        let targetX = centerX - (data.y * SENSITIVITY); let targetY = centerY - (data.p * SENSITIVITY);

                        targetX = Math.max(0, Math.min(window.innerWidth, targetX)); targetY = Math.max(0, Math.min(window.innerHeight, targetY));

                        // Store global X for the scrubber math
                        currentLaserX = targetX;

                        dom.laser.style.left = targetX + 'px'; dom.laser.style.top = targetY + 'px';

                        // --- THE PROXIMITY TRIGGER (Show Control Deck if looking down) ---
                        if (dom.cinema.style.display === 'block') {
                            if (targetY > window.innerHeight - 250) {
                                dom.controlDeck.style.bottom = '0px';
                            } else {
                                dom.controlDeck.style.bottom = '-250px';
                            }
                        }

                        dom.laser.style.display = 'none';
                        const elementBelow = document.elementFromPoint(targetX, targetY);
                        dom.laser.style.display = 'block';

                        if (elementBelow && elementBelow.classList.contains('hitbox')) {
                            if (hoverTarget !== elementBelow) { hoverTarget = elementBelow; hoverStartTime = performance.now(); isClicked = false; }
                            let progress = Math.min((performance.now() - hoverStartTime) / DWELL_DURATION, 1);
                            dom.ring.style.transform = `scale(${progress})`;

                            if (progress === 1 && !isClicked) {
                                isClicked = true; dom.ring.style.borderColor = '#00ff00';
                                elementBelow.click(); 
                            }
                        } else {
                            hoverTarget = null; hoverStartTime = null; isClicked = false;
                            dom.ring.style.transform = `scale(0)`; dom.ring.style.borderColor = 'rgba(255,0,0,0.5)';
                        }
                    }
                });
            } catch (err) {}
        });
    </script>
</body>
</html>
