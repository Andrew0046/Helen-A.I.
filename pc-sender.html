<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC Uplink: The Sensor Smuggler</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', Roboto, sans-serif; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .uplink-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); padding: 40px; border-radius: 16px; width: 400px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: relative; z-index: 10; }
        h1 { font-weight: 200; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 10px; color: #00d2ff; }
        p { color: #888; font-size: 0.9rem; margin-bottom: 30px; }
        input[type="text"] { background: rgba(0,0,0,0.3); border: 1px solid #333; padding: 15px; color: #00ff00; border-radius: 8px; font-size: 24px; text-align: center; width: 80%; letter-spacing: 5px; margin-bottom: 20px; font-weight: bold; }
        .btn-main { background: linear-gradient(135deg, #00d2ff 0%, #0078ff 100%); border: none; padding: 15px 30px; color: white; font-weight: bold; font-size: 16px; letter-spacing: 1px; border-radius: 30px; cursor: pointer; width: 100%; transition: transform 0.2s; }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0, 120, 255, 0.4); }
        #status { margin-top: 20px; font-size: 0.85rem; color: #ff9d00; text-transform: uppercase; letter-spacing: 1px; }
        
        /* THE PREVIEW SCREEN */
        #preview-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; opacity: 0.3; display: none; }
        video { width: 100%; height: 100%; object-fit: contain; }
        
        /* THE LASER POINTER */
        #laser-pointer { position: absolute; width: 20px; height: 20px; background: radial-gradient(circle, #ff0000 0%, transparent 80%); border-radius: 50%; box-shadow: 0 0 15px #ff0000; z-index: 9999; display: none; pointer-events: none; transition: top 0.05s linear, left 0.05s linear; transform: translate(-50%, -50%); }
    </style>
</head>
<body>

    <div id="laser-pointer"></div>

    <div id="preview-container">
        <video id="local-video" autoplay playsinline muted></video>
    </div>

    <div class="uplink-card" id="ui-card">
        <h1>PC Uplink</h1>
        <p>Enter the 4-digit PIN from your VR Hub</p>
        <input type="text" id="pin-input" placeholder="----" maxlength="4" autocomplete="off">
        <button class="btn-main" id="btn-connect">INITIATE UPLINK</button>
        <div id="status">Awaiting Connection...</div>
    </div>

    <script>
        const peer = new Peer(null, { debug: 2 });
        const dom = {
            pin: document.getElementById('pin-input'),
            btn: document.getElementById('btn-connect'),
            status: document.getElementById('status'),
            video: document.getElementById('local-video'),
            preview: document.getElementById('preview-container'),
            card: document.getElementById('ui-card'),
            laser: document.getElementById('laser-pointer')
        };

        let localStream = null;
        let mediaConn = null;
        let dataConn = null;

        dom.btn.addEventListener('click', async () => {
            const pin = dom.pin.value.trim();
            if (pin.length !== 4) { dom.status.innerText = "INVALID PIN"; return; }
            const hubId = 'juncos-hub-' + pin;

            try {
                dom.status.innerText = "SELECTING SCREEN...";
                // 1. Ask PC for Screen Capture
                localStream = await navigator.mediaDevices.getDisplayMedia({ video: { cursor: "always", frameRate: 60 }, audio: true });
                dom.video.srcObject = localStream;
                dom.preview.style.display = 'block';

                dom.status.innerText = "PUNCHING THROUGH NETWORK...";

                // 2. Open PIPE 1: The Media Channel (Video/Audio)
                mediaConn = peer.call(hubId, localStream, { metadata: { device: 'pc' } });
                
                // 3. Open PIPE 2: The Data Channel (Telemetry)
                dataConn = peer.connect(hubId);

                // --- PIPE 2 LOGIC (THE SENSOR SMUGGLER) ---
                dataConn.on('open', () => {
                    dom.status.innerText = "UPLINK STABLE. TELEMETRY ACTIVE.";
                    dom.card.style.opacity = '0.2'; // Dim the UI card so you can see the screen behind it
                    dom.laser.style.display = 'block'; // Turn on the laser pointer
                });

                dataConn.on('data', (data) => {
                    // data.p = Pitch (Up/Down in degrees)
                    // data.y = Yaw (Left/Right in degrees)
                    
                    if (data && typeof data.y === 'number' && typeof data.p === 'number') {
                        // The Math Translation
                        const sensitivity = 25; // Increase this if you want the laser to move faster across the screen
                        const centerX = window.innerWidth / 2;
                        const centerY = window.innerHeight / 2;

                        // A-Frame: Looking Left is positive Yaw, Looking Right is negative Yaw
                        // A-Frame: Looking Up is positive Pitch, Looking Down is negative Pitch
                        let targetX = centerX - (data.y * sensitivity);
                        let targetY = centerY - (data.p * sensitivity);

                        // Clamp the laser so it doesn't fly off the screen
                        targetX = Math.max(0, Math.min(window.innerWidth, targetX));
                        targetY = Math.max(0, Math.min(window.innerHeight, targetY));

                        // Physically move the HTML dot
                        dom.laser.style.left = targetX + 'px';
                        dom.laser.style.top = targetY + 'px';
                    }
                });

                // Cleanup if the screen sharing stops manually
                localStream.getVideoTracks()[0].onended = () => {
                    if(mediaConn) mediaConn.close();
                    if(dataConn) dataConn.close();
                    dom.status.innerText = "UPLINK SEVERED.";
                    dom.card.style.opacity = '1';
                    dom.laser.style.display = 'none';
                };

            } catch (err) {
                dom.status.innerText = "CAPTURE CANCELED OR FAILED.";
                console.error(err);
            }
        });
    </script>
</body>
</html>
