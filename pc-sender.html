<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC Uplink: The Grand Library</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', Roboto, sans-serif; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .uplink-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); padding: 40px; border-radius: 16px; width: 400px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: absolute; z-index: 10; transition: opacity 0.5s; }
        h1 { font-weight: 200; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 10px; color: #00d2ff; }
        p { color: #888; font-size: 0.9rem; margin-bottom: 30px; }
        input[type="text"] { background: rgba(0,0,0,0.3); border: 1px solid #333; padding: 15px; color: #00ff00; border-radius: 8px; font-size: 24px; text-align: center; width: 80%; letter-spacing: 5px; margin-bottom: 20px; font-weight: bold; }
        .btn-main { background: linear-gradient(135deg, #00d2ff 0%, #0078ff 100%); border: none; padding: 15px 30px; color: white; font-weight: bold; font-size: 16px; letter-spacing: 1px; border-radius: 30px; cursor: pointer; width: 100%; transition: transform 0.2s; }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0, 120, 255, 0.4); }
        #status { margin-top: 20px; font-size: 0.85rem; color: #ff9d00; text-transform: uppercase; letter-spacing: 1px; }
        
        #preview-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; opacity: 0.15; display: none; }
        video { width: 100%; height: 100%; object-fit: contain; }
        
        /* THE DWELL DASHBOARD */
        #dashboard { position: absolute; z-index: 5; display: none; flex-direction: row; gap: 40px; }
        .hitbox { width: 300px; height: 150px; background: rgba(0, 210, 255, 0.1); border: 2px solid #00d2ff; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; transition: background 0.3s, transform 0.1s; }
        
        /* THE LASER POINTER & DWELL RING */
        #laser-pointer { position: absolute; width: 10px; height: 10px; background: #ff0000; border-radius: 50%; box-shadow: 0 0 15px #ff0000; z-index: 9999; display: none; pointer-events: none; transform: translate(-50%, -50%); }
        #dwell-ring { position: absolute; top: -15px; left: -15px; width: 40px; height: 40px; border: 3px solid rgba(255,0,0,0.5); border-radius: 50%; box-sizing: border-box; transform: scale(0); transform-origin: center; transition: transform 0.05s linear; pointer-events: none; }
    </style>
</head>
<body>

    <div id="laser-pointer">
        <div id="dwell-ring"></div>
    </div>

    <div id="preview-container"><video id="local-video" autoplay playsinline muted></video></div>

    <div id="dashboard">
        <div class="hitbox" id="test-btn-1">SYSTEM TEST A</div>
        <div class="hitbox" id="test-btn-2">SYSTEM TEST B</div>
    </div>

    <div class="uplink-card" id="ui-card">
        <h1>PC Uplink</h1>
        <p>Enter the 4-digit PIN from your VR Hub</p>
        <input type="text" id="pin-input" placeholder="----" maxlength="4" autocomplete="off">
        <button class="btn-main" id="btn-connect">INITIATE UPLINK</button>
        <div id="status">Awaiting Connection...</div>
    </div>

    <script>
        const peer = new Peer(null, { debug: 2 });
        const dom = {
            pin: document.getElementById('pin-input'), btn: document.getElementById('btn-connect'), status: document.getElementById('status'),
            video: document.getElementById('local-video'), preview: document.getElementById('preview-container'), card: document.getElementById('ui-card'),
            laser: document.getElementById('laser-pointer'), ring: document.getElementById('dwell-ring'), dashboard: document.getElementById('dashboard')
        };

        let localStream = null; let mediaConn = null; let dataConn = null;
        
        // DWELL ENGINE STATE
        let hoverStartTime = null;
        let isClicked = false;
        const DWELL_DURATION = 1500; // 1.5 seconds to click
        const SENSITIVITY = 30; // Speed of the laser pointer

        dom.btn.addEventListener('click', async () => {
            const pin = dom.pin.value.trim();
            if (pin.length !== 4) { dom.status.innerText = "INVALID PIN"; return; }
            const hubId = 'juncos-hub-' + pin;

            try {
                dom.status.innerText = "SELECTING SCREEN...";
                localStream = await navigator.mediaDevices.getDisplayMedia({ video: { cursor: "always", frameRate: 60 }, audio: true });
                dom.video.srcObject = localStream; dom.preview.style.display = 'block';

                dom.status.innerText = "PUNCHING THROUGH NETWORK...";
                mediaConn = peer.call(hubId, localStream, { metadata: { device: 'pc' } });
                dataConn = peer.connect(hubId);

                dataConn.on('open', () => {
                    dom.card.style.opacity = '0'; setTimeout(() => dom.card.style.display = 'none', 500);
                    dom.dashboard.style.display = 'flex';
                    dom.laser.style.display = 'block';
                });

                dataConn.on('data', (data) => {
                    if (data && typeof data.y === 'number' && typeof data.p === 'number') {
                        const centerX = window.innerWidth / 2; const centerY = window.innerHeight / 2;
                        let targetX = centerX - (data.y * SENSITIVITY);
                        let targetY = centerY - (data.p * SENSITIVITY);

                        targetX = Math.max(0, Math.min(window.innerWidth, targetX));
                        targetY = Math.max(0, Math.min(window.innerHeight, targetY));

                        dom.laser.style.left = targetX + 'px';
                        dom.laser.style.top = targetY + 'px';

                        // --- THE DWELL ENGINE ---
                        // 1. Hide the laser physically from the document so it doesn't block the raycast
                        dom.laser.style.display = 'none';
                        const elementBelow = document.elementFromPoint(targetX, targetY);
                        dom.laser.style.display = 'block';

                        // 2. Check if we are staring at a button
                        if (elementBelow && elementBelow.classList.contains('hitbox')) {
                            if (!hoverStartTime) hoverStartTime = performance.now();
                            
                            let elapsed = performance.now() - hoverStartTime;
                            let progress = Math.min(elapsed / DWELL_DURATION, 1);
                            
                            dom.ring.style.transform = `scale(${progress})`;

                            // 3. Trigger the click!
                            if (progress === 1 && !isClicked) {
                                isClicked = true;
                                dom.ring.style.borderColor = '#00ff00';
                                elementBelow.click(); // Fire the physical HTML click
                            }
                        } else {
                            // Cancel hover if you look away
                            hoverStartTime = null;
                            isClicked = false;
                            dom.ring.style.transform = `scale(0)`;
                            dom.ring.style.borderColor = 'rgba(255,0,0,0.5)';
                        }
                    }
                });

            } catch (err) { dom.status.innerText = "CAPTURE CANCELED."; }
        });

        // TEST BUTTON LOGIC
        document.getElementById('test-btn-1').addEventListener('click', function() {
            this.style.background = 'rgba(0, 255, 0, 0.3)';
            this.innerText = "CLICKED!";
            setTimeout(() => { this.style.background = 'rgba(0, 210, 255, 0.1)'; this.innerText = "SYSTEM TEST A"; }, 2000);
        });

        document.getElementById('test-btn-2').addEventListener('click', function() {
            this.style.background = 'rgba(0, 255, 0, 0.3)';
            this.innerText = "CLICKED!";
            setTimeout(() => { this.style.background = 'rgba(0, 210, 255, 0.1)'; this.innerText = "SYSTEM TEST B"; }, 2000);
        });
    </script>
</body>
</html>
